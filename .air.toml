# .air.toml
root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/api ./cmd/api"
  bin = "./tmp/api"
  full_bin = ""
  delay = 200
  stop_on_error = true
  send_interrupt = true
  kill_delay = 500

[log]
  time = true

[misc]
  clean_on_exit = true

[watch]
  # watch all files under the project
  include_ext = ["go", "tpl", "tmpl", "html", "css", "js", "env", "yaml", "yml", "json"]
  exclude_dir = ["tmp", "vendor", ".git", "node_modules"]