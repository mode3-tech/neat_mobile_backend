  /createLoan:
    post:
      summary: Create a new loan application
      description: Create a comprehensive loan application including customer details,
        business information, due diligence, and verification documents. Automatically
        generates repayment schedule.
      tags:
      - Loans
      security:
      - bearerAuth: []
      parameters:
      - name: X-UserId
        in: header
        required: true
        schema:
          type: string
        description: ID of the staff member creating the loan (used for authentication
          and audit trail)
      - name: X-User-Latitude
        in: header
        required: false
        schema:
          type: string
        description: Latitude of the user's location
      - name: X-User-Longitude
        in: header
        required: false
        schema:
          type: string
        description: Longitude of the user's location
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                UserName:
                  type: string
                  description: Customer username for whom the loan is being created
                  example: NT70123456789
                BusinessAddress:
                  type: string
                  description: Address of the customer's business
                  example: 123 Business Street, Lagos
                BusinessValue:
                  type: number
                  format: float
                  description: Total value of the customer's business
                  example: 500000.0
                CustomerMonthlySalaryNetProfit:
                  type: number
                  format: float
                  description: Customer's monthly salary or net profit from business
                  example: 150000.0
                BusinessDescription:
                  type: string
                  description: Detailed description of the customer's business
                  example: Retail clothing store specializing in African prints
                LoanReason:
                  type: string
                  description: Reason for requesting the loan
                  example: Business expansion and inventory purchase
                CustomerSignature:
                  type: string
                  description: Customer's signature (base64 encoded image)
                  nullable: true
                  example: data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAA...
                LoanProduct:
                  type: string
                  description: Loan product ID
                  example: '1'
                CustomerPhotograph:
                  type: string
                  description: Customer's photograph (base64 encoded image)
                  nullable: true
                  example: data:image/jpeg;base64,/9j/4AAQSkZJRgABAQ...
                StaffSignature:
                  type: string
                  description: Staff member's signature (base64 encoded image)
                  nullable: true
                  example: data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAA...
                StockDescription:
                  type: string
                  description: Description of stocks/inventory in the business
                  example: African print fabrics, ready-to-wear clothing, accessories
                BusinessRegistered:
                  type: string
                  description: Whether the business is registered
                  example: 'Yes'
                  enum:
                  - 'Yes'
                  - 'No'
                BusinessType:
                  type: string
                  description: Type of business
                  example: Retail
                EconomicSector:
                  type: string
                  description: Economic sector the business operates in
                  example: Fashion and Retail
                GoodsServiceType:
                  type: string
                  description: Type of goods sold or services rendered
                  example: Clothing and Accessories
                State:
                  type: string
                  description: State where business is located
                  example: Lagos
                City:
                  type: string
                  description: City where business is located
                  example: Ikeja
                Landmark:
                  type: string
                  description: Landmark near business location
                  example: Near Ikeja City Mall
                BusinessPhone:
                  type: string
                  description: Business phone number
                  example: 08012345678
                BusinessAge:
                  type: integer
                  format: int32
                  description: Age of the business in months
                  example: 24
                BusinessFullAddress:
                  type: string
                  description: Complete business address
                  example: 123 Business Street, Ikeja, Lagos, Nigeria
                LoanPurpose:
                  type: string
                  description: Specific purpose for the loan
                  example: Purchase of new inventory for upcoming season
                AmountRequested:
                  type: number
                  format: float
                  description: Loan amount requested
                  example: 200000.0
                LoanTerm:
                  type: integer
                  format: int32
                  description: Loan term in months
                  example: 6
                Frequency:
                  type: string
                  description: Repayment frequency
                  example: Weekly
                  enum:
                  - Weekly
                  - Monthly
                  - Bi-weekly
                NoOfDependants:
                  type: integer
                  format: int32
                  description: Number of dependants
                  example: 3
                NoOfChildren:
                  type: integer
                  format: int32
                  description: Number of children
                  example: 2
                NoOfChildrenInSchool:
                  type: integer
                  format: int32
                  description: Number of children in school
                  example: 1
                NoOfMonthAtAddress:
                  type: integer
                  format: int32
                  description: Number of months at current address
                  example: 12
                HealthStatusOfDependant:
                  type: string
                  description: Health status of dependants
                  example: Good
                BVNFile:
                  type: string
                  description: BVN verification file (base64 encoded)
                  nullable: true
                  example: data:application/pdf;base64,JVBERi0xLjQK...
                Longitude:
                  type: number
                  format: float
                  description: Longitude coordinate of business location
                  example: 3.379206
                Latitude:
                  type: number
                  format: float
                  description: Latitude coordinate of business location
                  example: 6.524379
                LoanVerificationDocuments:
                  type: array
                  items:
                    type: string
                  description: Array of base64 encoded loan verification documents
                  example:
                  - data:image/jpeg;base64,/9j/4AAQSkZJRgABAQ...
                  - data:application/pdf;base64,JVBERi0xLjQK...
              required:
              - UserName
              - BusinessAddress
              - BusinessValue
              - CustomerMonthlySalaryNetProfit
              - BusinessDescription
              - LoanReason
              - LoanProduct
              - StockDescription
              - BusinessRegistered
              - BusinessType
              - EconomicSector
              - GoodsServiceType
              - State
              - City
              - Landmark
              - BusinessPhone
              - BusinessFullAddress
              - LoanPurpose
              - LoanTerm
              - Frequency
      responses:
        '200':
          description: Loan created successfully
          content:
            application/json:
              schema:
                oneOf:
                - type: object
                  properties:
                    status:
                      type: string
                      example: success
                    message:
                      type: string
                      example: Loan created successfully
                    data:
                      $ref: '#/components/schemas/Loan'
                - type: object
                  properties:
                    status:
                      type: string
                      example: success
                    message:
                      type: string
                      example: Loan created successfully, but 2 out of 5 documents
                        failed to upload
                    data:
                      $ref: '#/components/schemas/Loan'
                    document_errors:
                      type: array
                      items:
                        type: string
                      example:
                      - 'Failed to upload document: network error'
                      - 'Failed to upload document: invalid format'
        '400':
          description: Invalid request body or missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Customer or staff not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Customer already has a pending or active loan
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: failed
                  message:
                    type: string
                    example: Unable to process loan as customer either has a pending
                      or active loan
                  data:
                    $ref: '#/components/schemas/Loan'
        '500':
          description: Internal server error while creating loan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
