components:
  schemas:
    PendingDeposit:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: Deposit confirmation ID
        amount:
          type: number
          format: float
          description: Deposit amount
        tellerSessionId:
          type: string
          description: Teller session ID
        tellerRefNo:
          type: string
          description: Teller reference number
        date:
          type: string
          description: Deposit date
        status:
          type: string
          description: Deposit status
        madeById:
          type: integer
          format: int64
          description: ID of user who made the deposit
        remark:
          type: string
          description: Deposit remark
        fullName:
          type: string
          description: Customer's full name
        staff:
          type: string
          description: Staff member name
        branch:
          type: string
          description: Branch name
        group:
          type: string
          description: Group name
        refNo:
          type: string
          description: Reference number
        customerLoans:
          type: array
          items:
            $ref: '#/components/schemas/CustomerLoan'
        userId:
          type: integer
          format: int64
          description: User ID
        userUsername:
          type: string
          description: Username
        userEmail:
          type: string
          description: Email address
        userAvailableBalance:
          type: number
          format: float
          description: Available balance
        customerId:
          type: integer
          format: int64
          description: Customer ID
        customerMobilePhone:
          type: string
          description: Customer mobile phone
        customerBvn:
          type: string
          description: Customer BVN
        businessRefContactPerson:
          type: string
          description: Business reference contact person
        businessRefHomeVerification:
          type: string
          description: Business reference home verification status
        businessRefComment:
          type: string
          description: Business reference comments
        dueDiligenceBusinessAddress:
          type: string
          description: Business address
        dueDiligenceBusinessValue:
          type: string
          description: Present business value assessment
        dueDiligenceBusinessDescription:
          type: string
          description: Description of customer business
    DepositTransaction:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: Transaction ID
        refNo:
          type: string
          description: Transaction reference number
        trxType:
          type: string
          description: Transaction type (always "Deposit")
        amount:
          type: number
          format: float
          description: Transaction amount
        paymentType:
          type: string
          description: Payment type
        remark:
          type: string
          description: Transaction remark
        date:
          type: string
          description: Transaction date
        madeById:
          type: integer
          format: int64
          description: ID of user who made the transaction
        status:
          type: string
          description: Transaction status
        tellerRefNo:
          type: string
          description: Teller reference number
        tellerSessionId:
          type: string
          description: Teller session ID
        declined:
          type: boolean
          description: Whether transaction is declined
        fullName:
          type: string
          description: Customer's full name
        staff:
          type: string
          description: Staff member name
        branch:
          type: string
          description: Branch name
        group:
          type: string
          description: Group name
        customerLoans:
          type: array
          items:
            $ref: '#/components/schemas/CustomerLoan'
        userId:
          type: integer
          format: int64
          description: User ID
        userUsername:
          type: string
          description: Username
        customerId:
          type: integer
          format: int64
          description: Customer ID
    DeclinedDepositTransaction:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: Transaction ID
        refNo:
          type: string
          description: Transaction reference number
        trxType:
          type: string
          description: Transaction type (always "Deposit")
        amount:
          type: number
          format: float
          description: Transaction amount
        paymentType:
          type: string
          description: Payment type
        remark:
          type: string
          description: Transaction remark
        date:
          type: string
          description: Transaction date
        madeById:
          type: integer
          format: int64
          description: ID of user who made the transaction
        status:
          type: string
          description: Transaction status
        tellerRefNo:
          type: string
          description: Teller reference number
        tellerSessionId:
          type: string
          description: Teller session ID
        declined:
          type: boolean
          description: Whether transaction is declined (always true)
