          type: integer
          default: 1
          minimum: 1
        description: Page number for pagination
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 10
          minimum: 1
        description: Number of records per page
      - name: searchParams
        in: query
        required: false
        schema:
          type: string
        description: Search term to filter deposits by reference number, customer
          name, phone, BVN, ID number, account number, branch, group, or staff name
