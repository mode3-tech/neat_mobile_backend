  /depositConfirmation:
    get:
      summary: Get deposit confirmations
      description: Retrieve a paginated list of deposit confirmations with comprehensive
        customer and loan details. Supports filtering by status and search across
        multiple fields.
      tags:
      - Deposits
      security:
      - bearerAuth: []
      parameters:
      - name: X-UserId
        in: header
        required: true
        schema:
          type: string
        description: ID of the staff member making the request
      - name: page
        in: query
        required: false
