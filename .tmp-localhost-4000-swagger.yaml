  /disburseLoan:
    post:
      summary: Disburse loans in bulk
      description: Disburse multiple loans in a single operation. Requires staff with
        permission level 5 or higher.
      tags:
      - Loans
      security:
      - bearerAuth: []
      parameters:
      - name: X-UserId
        in: header
        required: true
        schema:
          type: string
        description: Staff encoded key for authentication and authorization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                LoanIds:
                  type: array
                  items:
                    type: string
                  description: Array of loan IDs to disburse
                  example:
                  - '123'
                  - '456'
                  - '789'
                CollectionDate:
                  type: string
                  description: Collection date for the disbursed loans
                  example: '2024-01-15'
              required:
              - LoanIds
      responses:
        '200':
          description: Loans disbursed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Disbursed 3 loans, 0 failed
                  data:
                    type: object
                    properties:
                      total:
                        type: integer
                        example: 3
                      success:
                        type: integer
                        example: 3
                      failed:
                        type: integer
                        example: 0
                      totalAmount:
                        type: number
                        format: float
                        example: 1500000.0
                      disbursedBy:
                        type: string
                        example: John Doe
                      position:
                        type: string
                        example: Loan Officer
                      permissionLevel:
                        type: integer
                        example: 5
                      disburseDate:
                        type: string
                        example: '2024-01-15'
                      results:
                        type: array
                        items:
                          type: object
                          properties:
                            loanId:
                              type: string
                            status:
                              type: string
                            message:
                              type: string
                            amount:
                              type: number
                              format: float
                            refNo:
                              type: string
                            customerId:
                              type: integer
                              format: int64
                            disburseDate:
                              type: string
        '400':
          description: Invalid request body or missing X-UserId header
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Insufficient permission level
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Staff not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error during loan disbursement
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
