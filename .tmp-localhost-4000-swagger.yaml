    post:
      summary: Decline or reject a loan
      description: Decline a loan application with optional rejection reason. Includes
        position-based permission validation and prevents declining already processed
        loans.
      tags:
      - Loans
      security:
      - bearerAuth: []
      parameters:
      - name: X-UserId
        in: header
        required: true
        schema:
          type: string
