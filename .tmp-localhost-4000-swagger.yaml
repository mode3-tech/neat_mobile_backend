      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                LoanId:
                  type: string
                  description: Loan ID to decline/reject
                  example: '12345'
                ReasonForRejection:
                  type: string
                  description: Optional reason for rejecting the loan
                  example: Insufficient documentation provided
              required:
              - LoanId
      responses:
        '200':
          description: Loan declined successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: 'Loan rejected successfully. Reason: Insufficient documentation
                      provided'
                  data:
                    type: object
                    properties:
                      loan:
                        $ref: '#/components/schemas/Loan'
                      validationLevel:
                        type: integer
                        description: Permission level of staff who rejected the loan
                        example: 5
                      status:
                        type: string
                        description: Updated loan status
                        example: Declined
                      declined:
                        type: boolean
                        description: Whether loan is declined
                        example: true
                      rejectedBy:
                        type: string
                        description: Name of staff who rejected the loan
                        example: John Doe
                      position:
                        type: string
                        description: Position of staff who rejected the loan
                        example: Branch Manager
                      reason:
                        type: string
                        description: Reason for rejection if provided
                        example: Insufficient documentation provided
        '400':
          description: Invalid request body, missing X-UserId, loan already declined,
            or loan in final status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Insufficient permissions or position level to reject the loan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
