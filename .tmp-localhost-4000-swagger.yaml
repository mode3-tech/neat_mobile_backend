openapi: 3.0.0
info:
  title: N.E.A.T API
  description: API for N.E.A.T API operations
  version: 1.0.0
  contact:
    name: Mode3 Support
    email: nill
  license:
    name: Proprietary
servers:
- url: https://neatapi.mode3.tech
  description: Staging server
- url: http://localhost:4000
  description: Local development server
paths:
  /createBranch:
    post:
      summary: Create a new branch
      description: Creates a new branch in the system after validating that the branch
        doesn't already exist
      tags:
      - Branches
      security:
      - bearerAuth: []
      parameters:
      - name: X-UserId
        in: header
        required: true
        schema:
          type: string
        description: ID of the user making the request
      - name: X-User-Latitude
        in: header
        required: false
        schema:
          type: string
        description: Latitude of the user's location
      - name: X-User-Longitude
        in: header
        required: false
        schema:
          type: string
        description: Longitude of the user's location
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Branch'
      responses:
        '200':
          description: Branch created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Branch Created Successfully
                  data:
                    $ref: '#/components/schemas/Branch'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Branch already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /allBranches:
    post:
      summary: Get all branches
      description: Retrieve all branches that the staff member is assigned to
      tags:
      - Branches
      security:
      - bearerAuth: []
      parameters:
      - name: X-UserId
        in: header
        required: true
        schema:
          type: string
        description: ID of the staff member making the request
      responses:
        '200':
          description: Branches retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: All Branches
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Branch'
        '500':
          description: Failed to fetch branches
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /createCustomer:
    post:
      summary: Create a new customer
      description: Creates a new customer with user information, customer details,
        and business references. Includes duplicate validation for mobile phone, email,
        username, and BVN.
      tags:
      - Customers
      security:
      - bearerAuth: []
      parameters:
      - name: X-UserId
        in: header
        required: true
        schema:
          type: string
        description: ID of the staff member creating the customer
      - name: X-User-Latitude
        in: header
        required: false
        schema:
          type: string
        description: Latitude of the user's location
      - name: X-User-Longitude
        in: header
        required: false
        schema:
          type: string
        description: Longitude of the user's location
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCustomerPayload'
      responses:
        '200':
          description: Customer created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Customer created successfully
                  data:
                    $ref: '#/components/schemas/CreateCustomerPayload'
        '400':
          description: Invalid request body or missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Customer with duplicate mobile phone, email, username, or BVN
            already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error during customer creation or file upload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /updateCustomer:
    post:
      summary: Update customer information
      description: Updates existing customer and user information. Handles file uploads
        for passport, signature, and next of kin passport.
      tags:
      - Customers
      security:
      - bearerAuth: []
      parameters:
      - name: X-UserId
        in: header
        required: true
        schema:
          type: string
        description: ID of the customer/user to update
      - name: X-User-Latitude
        in: header
        required: false
        schema:
          type: string
        description: Latitude of the user's location
      - name: X-User-Longitude
        in: header
        required: false
        schema:
          type: string
        description: Longitude of the user's location
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCustomerPayload'
      responses:
        '200':
          description: Customer updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Customer updated successfully
                  data:
                    type: string
                    example: ''
        '400':
          description: Invalid request body or missing X-UserId header
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User or customer information not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error during update or file upload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /pendingCustomers:
    get:
      summary: Get pending customers
      description: Retrieve a paginated list of customers with 'Pending' status. Supports
        search across multiple customer fields.
      tags:
      - Customers
      security:
      - bearerAuth: []
      parameters:
      - name: X-UserId
        in: header
        required: true
        schema:
          type: string
        description: ID of the staff member making the request
      - name: page
        in: query
        required: false
        schema:
          type: integer
          default: 1
          minimum: 1
        description: Page number for pagination
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 10
          minimum: 1
        description: Number of records per page
      - name: searchParams
        in: query
        required: false
        schema:
          type: string
        description: Search term to filter customers by BVN, mobile phone, email,
          username, name, ID number, or account number
      responses:
        '200':
          description: Pending customers retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Showing 1 to 10 of 50 customer records
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CustomerDetail'
        '500':
          description: Internal server error while fetching pending customers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /allCustomers:
    get:
      summary: Get all customers
      description: Retrieve a complete paginated list of all non-staff customers.
        Supports search across multiple customer fields.
      tags:
      - Customers
      security:
      - bearerAuth: []
      parameters:
      - name: X-UserId
        in: header
        required: true
        schema:
          type: string
        description: ID of the staff member making the request
      - name: page
        in: query
        required: false
        schema:
          type: integer
          default: 1
          minimum: 1
        description: Page number for pagination
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 10
          minimum: 1
        description: Number of records per page
      - name: searchParams
        in: query
        required: false
        schema:
          type: string
        description: Search term to filter customers by BVN, mobile phone, email,
          username, name, ID number, or account number
      responses:
        '200':
          description: All customers retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Showing 1 to 10 of 150 customer records
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CustomerDetail'
        '500':
          description: Internal server error while fetching all customers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /activeCustomers:
    get:
      summary: Get active customers
      description: Retrieve a paginated list of customers with 'Approved' status,
        including comprehensive customer details, loan information, and business data.
        Supports search across multiple customer and loan fields.
      tags:
      - Customers
      security:
      - bearerAuth: []
      parameters:
      - name: X-UserId
        in: header
        required: true
        schema:
          type: string
        description: ID of the staff member making the request
      - name: page
        in: query
        required: false
        schema:
          type: integer
          default: 1
          minimum: 1
        description: Page number for pagination
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 10
          minimum: 1
        description: Number of records per page
      - name: searchParams
        in: query
        required: false
        schema:
          type: string
        description: Search term to filter customers by BVN, mobile phone, email,
          username, name, ID number, account number, or loan reference number
      responses:
        '200':
          description: Active customers retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Showing 1 to 10 of 75 customer records
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ActiveCustomerDetail'
        '500':
          description: Internal server error while fetching active customers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    /viewCustomer: null
    post:
      summary: Get customer details by customer ID
      description: Retrieve comprehensive customer details including user information,
        customer profile, business references, and loan count using customer username/ID.
      tags:
      - Customers
      security:
      - bearerAuth: []
      parameters:
      - name: X-UserId
        in: header
        required: true
        schema:
          type: string
        description: ID of the staff member making the request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                CustomerId:
                  type: string
                  description: Customer username or ID to look up
                  example: NT70123456789
              required:
              - CustomerId
      responses:
        '200':
          description: Customer details retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Customer Details
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CustomerDetail'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error while fetching customer details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /getCustomerByPhone:
    post:
      summary: Search customers by phone number
      description: Search for customers using partial or complete mobile phone number.
        Returns matching customer records with comprehensive details.
      tags:
      - Customers
      security:
      - bearerAuth: []
      parameters:
      - name: X-UserId
        in: header
        required: true
        schema:
          type: string
        description: ID of the staff member making the request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                MobilePhone:
                  type: string
                  description: Mobile phone number to search for (supports partial
                    matching)
                  example: '7012345678'
              required:
              - MobilePhone
      responses:
        '200':
          description: Customers found successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Customer Info
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CustomerDetail'
        '400':
          description: Invalid request body or missing MobilePhone field
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error while searching customers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /getCustomerByEmail:
    post:
      summary: Search customers by email address
      description: Search for customers using partial or complete email address. Returns
        matching customer records with comprehensive details.
      tags:
      - Customers
      security:
      - bearerAuth: []
      parameters:
      - name: X-UserId
        in: header
        required: true
        schema:
          type: string
        description: ID of the staff member making the request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Email:
                  type: string
                  description: Email address to search for (supports partial matching,
                    case-insensitive)
                  example: customer@example.com
              required:
              - Email
      responses:
        '200':
          description: Customers found successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Customer Info
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CustomerDetail'
        '400':
          description: Invalid request body or missing Email field
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error while searching customers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /getCustomerByName:
    post:
      summary: Search customers by name
      description: Search for customers using partial or complete name. Searches across
        first name, last name, and middle name fields. Returns matching customer records
        with comprehensive details.
      tags:
      - Customers
      security:
      - bearerAuth: []
      parameters:
      - name: X-UserId
        in: header
        required: true
        schema:
          type: string
        description: ID of the staff member making the request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  type: string
                  description: Name to search for (searches first name, last name,
                    and middle name with partial matching, case-insensitive)
                  example: John Doe
              required:
              - Name
      responses:
        '200':
          description: Customers found successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Customer Info
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CustomerDetail'
        '400':
          description: Invalid request body or missing Name field
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error while searching customers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /getCustomerByBvn:
    post:
      summary: Search customers by BVN
      description: Search for customers using partial or complete Bank Verification
        Number. Returns matching customer records with comprehensive details.
      tags:
      - Customers
      security:
      - bearerAuth: []
      parameters:
      - name: X-UserId
        in: header
        required: true
        schema:
          type: string
        description: ID of the staff member making the request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Bvn:
                  type: string
                  description: Bank Verification Number to search for (supports partial
                    matching)
                  example: '12345678901'
              required:
              - Bvn
      responses:
        '200':
          description: Customers found successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Customer Info
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CustomerDetail'
        '400':
          description: Invalid request body or missing Bvn field
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error while searching customers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /customerApproval:
    post:
      summary: Approve a customer
      description: Approve a customer account and create a virtual account for them.
        Includes branch validation and virtual account creation.
      tags:
      - Customers
      security:
      - bearerAuth: []
      parameters:
      - name: X-UserId
        in: header
        required: true
        schema:
          type: string
        description: ID of the staff member making the request
      - name: X-User-Latitude
        in: header
        required: false
        schema:
          type: string
        description: Latitude of the user's location
      - name: X-User-Longitude
        in: header
        required: false
        schema:
          type: string
        description: Longitude of the user's location
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                CustomerAccountNo:
                  type: string
                  description: Customer username/account number to approve
                  example: NT70123456789
                StaffId:
                  type: string
                  description: ID of the staff member performing the approval
                  example: '12345'
              required:
              - CustomerAccountNo
              - StaffId
      responses:
        '200':
          description: Customer approved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Approval Successful
                  data:
                    type: object
                    properties:
                      virtualAccountNo:
                        type: string
                        description: Virtual account number created for the customer
                        example: '9999888877776666'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Staff not authorized to approve customers from this branch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Customer is already approved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error during approval or virtual account creation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /customerRejection:
    post:
      summary: Reject a customer
      description: Reject a customer account with a specified reason. Includes branch
        validation.
      tags:
      - Customers
      security:
      - bearerAuth: []
      parameters:
      - name: X-UserId
        in: header
        required: true
        schema:
          type: string
        description: ID of the staff member making the request
      - name: X-User-Latitude
        in: header
        required: false
        schema:
          type: string
        description: Latitude of the user's location
      - name: X-User-Longitude
        in: header
        required: false
        schema:
          type: string
        description: Longitude of the user's location
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                CustomerAccountNo:
                  type: string
                  description: Customer username/account number to reject
                  example: NT70123456789
                StaffId:
                  type: string
                  description: ID of the staff member performing the rejection
                  example: '12345'
                RejectionReason:
                  type: string
                  description: Reason for rejecting the customer
                  example: Incomplete documentation
              required:
              - CustomerAccountNo
              - StaffId
              - RejectionReason
      responses:
        '200':
          description: Customer rejected successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Rejection Successful
                  data:
                    type: string
                    example: ''
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Staff not authorized to reject customers from this branch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error during rejection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    /getCustomerByGroupId/{group_id}: null
    get:
      summary: Get customers by group ID
      description: Retrieve a paginated list of customers belonging to a specific
        group. Returns comprehensive customer details including user information,
        customer profile, business references, and loan count.
      tags:
      - Customers
      security:
      - bearerAuth: []
      parameters:
      - name: X-UserId
        in: header
        required: true
        schema:
          type: string
        description: ID of the staff member making the request
      - name: group_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
        description: Group ID to filter customers by
      - name: page
        in: query
        required: false
        schema:
          type: integer
          default: 1
          minimum: 1
        description: Page number for pagination
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 10
          minimum: 1
        description: Number of records per page
      responses:
        '200':
          description: Customers retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Showing 1 to 10 of 25 customer records
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CustomerDetail'
        '400':
          description: Missing or invalid group ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error while fetching customers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /getCustomerByStaffId/{staff_id}:
    get:
      summary: Get customers by staff ID
      description: Retrieve a paginated list of customers created by a specific staff
        member. Returns comprehensive customer details including user information,
        customer profile, business references, and loan count.
      tags:
      - Customers
      security:
      - bearerAuth: []
      parameters:
      - name: X-UserId
        in: header
        required: true
        schema:
          type: string
        description: ID of the staff member making the request
      - name: staff_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
        description: Staff ID to filter customers by (customers created by this staff
          member)
      - name: page
        in: query
        required: false
        schema:
          type: integer
          default: 1
          minimum: 1
        description: Page number for pagination
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 10
          minimum: 1
        description: Number of records per page
      responses:
        '200':
          description: Customers retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Showing 1 to 10 of 15 customer records
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CustomerDetail'
        '400':
          description: Missing or invalid staff ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error while fetching customers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /getCustomerByAccountId:
    post:
      summary: Get customer by account ID
      description: Retrieve customer details by account username/ID. Returns comprehensive
        customer information including user details, customer profile, business references,
        and loan count.
      tags:
      - Customers
      security:
      - bearerAuth: []
      parameters:
      - name: X-UserId
        in: header
        required: true
        schema:
          type: string
        description: ID of the staff member making the request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                AccountId:
                  type: string
                  description: Customer username/account ID to look up
                  example: NT70123456789
              required:
              - AccountId
      responses:
        '200':
