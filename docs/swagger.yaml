openapi: 3.0.3
info:
  title: Neat Mobile App Backend API
  version: 1.0.0
  description: |
    HTTP API for authentication, OTP verification, device trust, identity validation,
    password reset, and loan product workflows.
servers:
  - url: /api/v1
security: []
tags:
  - name: Auth
    description: Authentication and identity endpoints
  - name: OTP
    description: OTP request and verification endpoints
  - name: Loan
    description: Loan product discovery and application endpoints
  - name: Notification
    description: Push-token registration and in-app notification history endpoints
  - name: Internal
    description: Internal CBA integration endpoints protected by HMAC headers
  - name: Dev Signer
    description: Development-only signer helper endpoints for Postman/device simulation
paths:
  /auth/register:
    post:
      tags:
        - Auth
      summary: Register a user
      description: Creates a new account and binds the initial device in one transaction. The server captures the client IP from the request metadata and stores it with the created auth session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
        "400":
          description: Invalid request body or failed registration validation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Account or device already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Registration failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/login:
    post:
      tags:
        - Auth
      summary: Login a user
      description: |
        Authenticates a user by phone and password, then starts device verification flow.
        The server evaluates the submitted `X-Device-ID` against the authenticated user's stored devices.
        If that device exists and is both active and trusted, returns `challenge_required`.
        If the device is missing, inactive, or untrusted, returns `new_device_detected`, sends a login OTP to the user's
        phone number, and returns a `session_token` for `/auth/verify-new-device` and `/auth/resend-new-device-otp`.
      parameters:
        - in: header
          name: X-Device-ID
          required: true
          schema:
            type: string
          description: Stable device installation identifier from the mobile app, used to look up device trust for the account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login initialized; response shape depends on device trust state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginInitResponse"
              examples:
                challenge_required:
                  summary: Recognized trusted device
                  value:
                    status: challenge_required
                    challenge: V6Y0dxLF5leasw5ISJZgshZc8HP75fkQjwD8f2fOUeQ
                new_device_detected:
                  summary: Device missing, inactive, or untrusted
                  value:
                    status: new_device_detected
                    session_token: CxDfs7E0ucjQ8v72n9v5M9o2xU4SyfV8h3caE6WvF1A
        "400":
          description: Invalid request body, invalid phone number, or missing/invalid device id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid phone or password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Too many login attempts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Login initialization failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/verify-device:
    post:
      tags:
        - Auth
      summary: Verify device challenge
      description: Verifies a signed login challenge for a recognized trusted device and returns tokens.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyDeviceRequest"
      responses:
        "200":
          description: Device verification successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyDeviceResponse"
        "400":
          description: Invalid request body or missing challenge fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid challenge or signature verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Device verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/verify-new-device:
    post:
      tags:
        - Auth
      summary: Verify new device with OTP
      description: |
        Completes login when the submitted `X-Device-ID` from `/auth/login` was not found as an
        active trusted device, using the `session_token` returned by `/auth/login` and the OTP sent
        during `new_device_detected` flow. If the OTP expires or is not received, request another code
        with `/auth/resend-new-device-otp` using the same `session_token` and `device_id`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewDeviceRequest"
      responses:
        "200":
          description: New device verified and tokens issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyDeviceResponse"
        "400":
          description: Invalid request body or missing required fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid/expired session token or invalid OTP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: New-device verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/resend-new-device-otp:
    post:
      tags:
        - Auth
      summary: Resend OTP for new device login
      description: |
        Resends the login OTP for an active `new_device_detected` session created by `/auth/login`.
        The same `session_token` remains valid and the pending session expiry is extended.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResendNewDeviceOTPRequest"
      responses:
        "200":
          description: OTP resent successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
              examples:
                success:
                  value:
                    message: otp resent successfully
        "400":
          description: Invalid request body or missing session token/device id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid or expired session token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: OTP resend cooldown or resend limit reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to resend OTP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /health:
    get:
      tags:
        - Dev Signer
      summary: Dev signer health check
      description: |
        Development-only endpoint served by `cmd/devsigner`.
      servers:
        - url: http://localhost:9090
      responses:
        "200":
          description: Signer is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DevHealthResponse"
  /sign:
    post:
      tags:
        - Dev Signer
      summary: Sign challenge (development only)
      description: |
        Development-only endpoint served by `cmd/devsigner` to help Postman flows.
        It signs `SHA-256(challenge)` using the configured ECDSA P-256 private key for `device_id`.
      servers:
        - url: http://localhost:9090
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DevSignRequest"
      responses:
        "200":
          description: Challenge signed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DevSignResponse"
        "400":
          description: Invalid request body or missing fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Device key not found in signer configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/logout:
    post:
      tags:
        - Auth
      summary: Logout a user
      description: Revokes the current auth session and refresh token record.
      parameters:
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
          description: "Bearer access token. Example: `Bearer <access_token>`."
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
      responses:
        "200":
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Invalid request body or missing authorization header
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid authorization header
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Logout failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/refresh:
    post:
      tags:
        - Auth
      summary: Refresh access token
      description: Validates a refresh token and device binding from request body, rotates the refresh token, and returns new access and refresh tokens.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: Tokens refreshed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          description: Missing refresh token/device id or invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Token refresh failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/validate-bvn:
    post:
      tags:
        - Auth
      summary: Validate BVN
      description: Validates a BVN using Tendar only. Provider preference from CBA is ignored for this endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BVNValidationRequest"
      responses:
        "200":
          description: BVN validated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BVNValidationResponse"
        "400":
          description: Missing or invalid request body, invalid BVN, or provider validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Upstream service unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "504":
          description: Upstream service timed out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: CBA lookup, provider, or internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/validate-nin:
    post:
      tags:
        - Auth
      summary: Validate NIN
      description: Validates a NIN using the configured NIN provider and compares it with a previously verified BVN using `bvn_validation_id`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NINValidationRequest"
      responses:
        "200":
          description: NIN validated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NINValidationResponse"
        "400":
          description: Missing or invalid request body, invalid NIN, or provider validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Upstream service unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "504":
          description: Upstream service timed out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Provider or internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/forgot-password:
    post:
      tags:
        - Auth
      summary: Request password reset OTP
      description: Sends a password reset OTP to the account phone number for a recognized device.
      parameters:
        - in: header
          name: X-Device-ID
          required: true
          schema:
            type: string
          description: Registered device identifier for the account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
      responses:
        "200":
          description: Password reset OTP sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Account not found for phone number or device not recognized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to create or send password reset OTP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/reset-password:
    post:
      tags:
        - Auth
      summary: Reset password with OTP
      description: Verifies a password reset OTP, marks it as used, and updates the user's password hash.
      parameters:
        - in: header
          name: X-Device-ID
          required: true
          schema:
            type: string
          description: Registered device identifier for the account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "200":
          description: Password reset successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Invalid request body, missing reset code, or invalid password format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid device id, reset code, or user context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Password reset failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/otp/request:
    post:
      tags:
        - OTP
      summary: Request OTP
      description: Sends an OTP for login, signup, or password reset via SMS or email.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestOTPRequest"
      responses:
        "200":
          description: OTP sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Invalid request body, purpose, channel, email, or phone number
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: SMS delivery failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: SMS service not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/otp/verify:
    post:
      tags:
        - OTP
      summary: Verify OTP
      description: Verifies a previously issued OTP.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyOTPRequest"
      responses:
        "200":
          description: OTP verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyOTPResponse"
        "400":
          description: Invalid request body, purpose, or channel
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid OTP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /loan:
    get:
      tags:
        - Loan
      summary: List loan products
      description: Returns the currently available loan products from storage.
      responses:
        "200":
          description: Loan products fetched successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoanProductsResponse"
        "500":
          description: Failed to fetch loan products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /loan/apply:
    post:
      tags:
        - Loan
      summary: Apply for a loan
      description: |
        Creates an embryo loan application after validating
        the selected product, business data, transaction pin,
        user verification state, and core-banking loan checks.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoanApplicationRequest"
      responses:
        "200":
          description: Loan application created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoanApplicationResponse"
        "400":
          description: Invalid request body or malformed input fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Incorrect transaction pin or other unauthorized validation failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Current user or loan rule not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Multiple core-banking customers matched the supplied BVN
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: User or application data failed business-rule validation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Too many incorrect transaction pin attempts or temporary lockout
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Core-banking lookup failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Core-banking integration is unavailable or not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Loan application failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /loan/loans:
    get:
      tags:
        - Loan
      summary: List customer loans
      description: Returns the authenticated user's loan list from core banking.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Customer loans fetched successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoanListResponse"
        "400":
          description: Invalid user context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid access token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User or user loan record not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Core-banking lookup failed or integration is unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /loan/repayment-schedule:
    get:
      tags:
        - Loan
      summary: Get repayment schedule
      description: Returns the repayment schedule for a specific core-banking loan id.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: loan_id
          required: true
          schema:
            type: string
          description: Core-banking loan identifier.
      responses:
        "200":
          description: Loan repayment schedule fetched successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoanRepaymentsResponse"
        "400":
          description: Missing or invalid loan id query parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid access token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Core-banking integration is unavailable or repayment lookup failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /notifications:
    get:
      tags:
        - Notification
      summary: List notifications
      description: Returns the authenticated user's in-app notification history in newest-first order.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number for paginated history retrieval.
        - in: query
          name: page_size
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Number of notifications to return per page.
      responses:
        "200":
          description: Notification history fetched successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationsListResponse"
        "401":
          description: Missing or invalid access token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Notification service is not configured or retrieval failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /notifications/unread-count:
    get:
      tags:
        - Notification
      summary: Get unread notification count
      description: Returns the current unread notification count for the authenticated user.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Unread count fetched successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnreadCountResponse"
        "401":
          description: Missing or invalid access token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Notification service is not configured or retrieval failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /notifications/read-all:
    patch:
      tags:
        - Notification
      summary: Mark all notifications as read
      description: Marks all unread notifications for the authenticated user as read.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Notifications updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationsReadAllResponse"
        "401":
          description: Missing or invalid access token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Notification service is not configured or update failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /notifications/{id}/read:
    patch:
      tags:
        - Notification
      summary: Mark one notification as read
      description: Marks a single notification owned by the authenticated user as read.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Notification identifier.
      responses:
        "200":
          description: Notification updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationReadResponse"
        "400":
          description: Missing notification id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid access token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Notification service is not configured or update failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /notifications/token:
    post:
      tags:
        - Notification
      summary: Register push token
      description: Upserts the Expo push token for the authenticated user and device.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterPushTokenRequest"
      responses:
        "200":
          description: Push token registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Invalid request body, platform, or Expo push token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid access token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Notification service is not configured or token registration failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags:
        - Notification
      summary: Delete push token
      description: Deletes the push token associated with the authenticated user and the supplied `X-Device-ID`.
      security:
        - bearerAuth: []
      parameters:
        - in: header
          name: X-Device-ID
          required: true
          schema:
            type: string
          description: Device identifier used during token registration.
      responses:
        "200":
          description: Push token deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Missing device id header
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid access token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Notification service is not configured or token deletion failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /notifications/send:
    post:
      tags:
        - Internal
      summary: Send notification internally
      description: |
        Internal endpoint used by trusted backend callers to create notification history, send Expo push messages,
        and persist accepted Expo ticket ids for later receipt polling. This endpoint is served under `/internal/v1`
        and is protected by HMAC headers.
      servers:
        - url: /internal/v1
      parameters:
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number for the embryo loan application summary list.
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Number of embryo loan application summaries to return per page.
        - in: header
          name: X-Timestamp
          required: true
          schema:
            type: string
            format: date-time
          description: RFC3339 timestamp used in the HMAC signing string.
        - in: header
          name: X-Signature
          required: true
          schema:
            type: string
          description: Lowercase hex HMAC-SHA256 signature of `METHOD + "\n" + PATH + "\n" + TIMESTAMP + "\n" + SHA256_HEX_OF_BODY` using `NOTIFICATION_INTERNAL_SECRET`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendNotificationRequest"
      responses:
        "200":
          description: Notification sent successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Invalid request body or missing required notification fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid internal HMAC headers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Upstream push delivery call failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Push sender is not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
