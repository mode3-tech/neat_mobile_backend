  /transaction/recent:
    get:
      tags:
        - Transaction
      summary: Fetch recent transactions
      description: Returns the most recent transactions for the authenticated user's wallet.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Recent transactions fetched successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FetchRecentTransactionsResponse"
        "401":
          description: Unauthorized or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to fetch transactions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /transaction/all:
    get:
      tags:
        - Transaction
      summary: Fetch all transactions (paginated)
      description: |
        Returns all transactions for the authenticated user's wallet, grouped by
        month and paginated via a cursor. Pass the `next_cursor` from the previous
        response as the `cursor` query parameter to fetch the next page. Omit
        `cursor` on the first request.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: limit
          required: true
          schema:
            type: integer
            example: 20
          description: Number of transactions to return per page.
        - in: query
          name: cursor
          required: false
          schema:
            type: string
            format: date-time
            example: "2026-04-01T00:00:00Z"
          description: RFC3339 timestamp cursor from the previous page's `next_cursor`. Omit on the first request.
      responses:
        "200":
          description: Transactions fetched successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedTransactionResponse"
        "400":
          description: Missing or invalid query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to fetch transactions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /webhooks/providus/credit:
    post:
      tags:
        - Webhook
      summary: Providus credit notification
      description: |
        Receives inbound credit notifications from Providus when money lands on a
        user's virtual account. Protected by a shared secret sent in the
        `X-Notification-Secret` header. Always returns 200 — errors are logged
        internally and do not trigger Providus retries.
      servers:
        - url: /
      parameters:
        - in: header
          name: X-Notification-Secret
          required: true
          schema:
            type: string
          description: Shared secret configured with Providus to authenticate inbound webhook calls.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProvidusCreditPayload"
      responses:
        "200":
          description: Notification acknowledged
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
        "401":
          description: Missing or invalid notification secret
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /cba/loan-applications:
    get:
      tags:
        - Internal
      summary: Get latest embryo loan application for a user
      description: |
        Returns the most recent loan application for the supplied wallet user id
        where either the loan status is `embryo` or the customer status is
        `embryo`.
        This endpoint is served under `/internal/v1` and is protected by HMAC headers.
      servers:
        - url: /internal/v1
      parameters:
        - in: query
          name: user_id
          required: true
          schema:
            type: string
          description: Wallet mobile user id to look up.
        - in: header
          name: X-Timestamp
          required: true
          schema:
            type: string
            format: date-time
          description: RFC3339 timestamp used in the HMAC signing string. Must be within five minutes of server time.
        - in: header
          name: X-Signature
          required: true
          schema:
            type: string
          description: Lowercase hex HMAC-SHA256 signature of `METHOD + "\n" + PATH + "\n" + TIMESTAMP + "\n" + SHA256_HEX_OF_BODY` using `CBA_WEBHOOK_SECRET`.
      responses:
        "200":
          description: Latest embryo loan application fetched successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalLoanApplicationsResponse"
        "400":
          description: Missing or invalid user id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid internal HMAC headers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal auth is not configured or the fetch failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /cba/loan-applications/embryo:
