components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    DevHealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
    DevSignRequest:
      type: object
      required:
        - device_id
        - challenge
      properties:
        device_id:
          type: string
          example: sim-device-1
        challenge:
          type: string
          example: V6Y0dxLF5leasw5ISJZgshZc8HP75fkQjwD8f2fOUeQ
    DevSignResponse:
      type: object
      required:
        - signature
        - algorithm
      properties:
        signature:
          type: string
          description: Base64url-encoded ECDSA P-256 signature (ASN.1 DER) over SHA-256(challenge)
          example: MEUCIG4lQ0A5Wc1zN8hP8o2N2iU9V3gT0E2q9r2m1kYzv1U-AiEAz8r8Jt2s2l7cQwZ9k0IY3l8Gx6b4u5m8N9p0Q1r2s3A
        algorithm:
          type: string
          example: ecdsa-p256-sha256
    DeviceRegistrationRequest:
      type: object
      required:
        - device_id
        - public_key
        - device_name
        - device_model
        - os
        - os_version
        - app_version
      properties:
        device_id:
          type: string
          example: app-installation-id
        public_key:
          type: string
          example: yMK6+dd12JqQtw6Ts5nF7gxjMe6VQ7n1xNlwLWmk/yI=
        device_name:
          type: string
          example: John's iPhone
        device_model:
          type: string
          example: iPhone 15
        os:
          type: string
          example: iOS
        os_version:
          type: string
          example: "18.2"
        app_version:
          type: string
          example: 1.0.0
    RegisterRequest:
      type: object
      required:
        - phone_number
        - password
        - confirm_password
        - transaction_pin
        - confirm_transaction_pin
        - bvn_verification_id
        - nin_verification_id
        - phone_verification_id
        - is_biometrics_enabled
        - device
      properties:
        phone_number:
          type: string
          description: Nigerian phone number. Accepted local or international forms are normalized server-side.
          example: "08012345678"
        email:
          type: string
          format: email
          description: Optional email address. When supplied, pair it with `email_verification_id`.
          example: user@example.com
        password:
          type: string
          minLength: 8
          example: your-password
        confirm_password:
          type: string
          minLength: 8
          example: your-password
        transaction_pin:
          type: string
          minLength: 4
          maxLength: 6
          example: "1234"
        confirm_transaction_pin:
          type: string
          minLength: 4
          maxLength: 6
          example: "1234"
        bvn_verification_id:
          type: string
          example: b8fa4c0f-a086-4f9d-96db-3ac7457f6298
        nin_verification_id:
          type: string
          example: b8fa4c0f-a086-4f9d-96db-3ac7457f6298
        phone_verification_id:
          type: string
          example: b8fa4c0f-a086-4f9d-96db-3ac7457f6298
        email_verification_id:
          type: string
          description: Verification ID returned by `/auth/otp/verify` for the optional email step.
          example: b8fa4c0f-a086-4f9d-96db-3ac7457f6298
        is_biometrics_enabled:
          type: boolean
          example: true
        device:
          $ref: "#/components/schemas/DeviceRegistrationRequest"
    RegisterResponse:
      type: object
      required:
        - message
        - access_token
        - refresh_token
      properties:
        message:
          type: string
          example: registration successful
        access_token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.access
        refresh_token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.refresh
    LoginRequest:
      type: object
      required:
        - phone
        - password
      properties:
        phone:
          type: string
          example: "08012345678"
        password:
          type: string
          minLength: 8
          example: your-password
    LoginChallengeRequiredResponse:
      type: object
      title: Trusted device challenge response
      required:
        - status
        - challenge
      properties:
        status:
          type: string
          enum:
            - challenge_required
          example: challenge_required
        challenge:
          type: string
          description: Present when status is challenge_required.
          example: V6Y0dxLF5leasw5ISJZgshZc8HP75fkQjwD8f2fOUeQ
    LoginNewDeviceDetectedResponse:
      type: object
      title: New device OTP response
      required:
        - status
        - session_token
      properties:
        status:
          type: string
          enum:
            - new_device_detected
          example: new_device_detected
        session_token:
          type: string
          description: Present when status is new_device_detected because the submitted X-Device-ID was not an active trusted device; use this with OTP at /auth/verify-new-device or to request another code at /auth/resend-new-device-otp.
          example: CxDfs7E0ucjQ8v72n9v5M9o2xU4SyfV8h3caE6WvF1A
    LoginInitResponse:
      discriminator:
        propertyName: status
        mapping:
          challenge_required: "#/components/schemas/LoginChallengeRequiredResponse"
          new_device_detected: "#/components/schemas/LoginNewDeviceDetectedResponse"
      oneOf:
        - $ref: "#/components/schemas/LoginChallengeRequiredResponse"
        - $ref: "#/components/schemas/LoginNewDeviceDetectedResponse"
    LoginResponse:
      type: object
      properties:
        access_token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.access
        refresh_token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.refresh
    VerifyDeviceRequest:
      type: object
      required:
        - challenge
        - signature
        - device_id
      properties:
        challenge:
          type: string
          description: Raw challenge value returned by /auth/login.
          example: V6Y0dxLF5leasw5ISJZgshZc8HP75fkQjwD8f2fOUeQ
        signature:
          type: string
          description: Signature over challenge bytes from the device private key.
          example: ELSgo8lWnShQUe7J79hYUf-TQqfivhBpJeIhP_AfDDeL4mQQQZAoqfCD7YLI7hRQelFWDk1f6v4CyLt2vAUyDg
        device_id:
          type: string
          description: Device identifier used during login initialization.
          example: app-installation-id
    VerifyDeviceResponse:
      type: object
      required:
        - status
        - access_token
        - refresh_token
      properties:
        status:
          type: string
          example: success
        access_token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.access
        refresh_token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.refresh
        action_token:
          type: string
          description: Reserved for short-lived sensitive actions.
          example: ""
    NewDeviceRequest:
      type: object
      required:
        - session_token
        - otp
        - device
      properties:
        session_token:
          type: string
          description: Session token returned from /auth/login when status is new_device_detected. The same token is also used with /auth/resend-new-device-otp.
          example: CxDfs7E0ucjQ8v72n9v5M9o2xU4SyfV8h3caE6WvF1A
        otp:
          type: string
          minLength: 6
          maxLength: 6
          example: "123456"
        device:
          $ref: "#/components/schemas/DeviceRegistrationRequest"
    ResendNewDeviceOTPRequest:
      type: object
      required:
        - session_token
        - device_id
      properties:
        session_token:
          type: string
          description: Session token returned from /auth/login when status is new_device_detected.
