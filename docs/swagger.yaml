          type: string
          format: uuid
          example: b8fa4c0f-a086-4f9d-96db-3ac7457f6298
        otp_code:
          type: string
          minLength: 6
          maxLength: 6
          example: "123456"
    VerifyForgotTransactionPinOTPResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        message:
          type: string
          example: OTP verified successfully
        verification_id:
          type: string
          format: uuid
          example: b8fa4c0f-a086-4f9d-96db-3ac7457f6298
    ResetTransactionPinRequest:
      type: object
      required:
        - verification_id
        - new_pin
        - confirm_new_pin
      properties:
        verification_id:
          type: string
          format: uuid
          example: b8fa4c0f-a086-4f9d-96db-3ac7457f6298
        new_pin:
          type: string
          example: "4321"
        confirm_new_pin:
          type: string
          example: "4321"
    RequestTransactionPinChangeResponse:
      type: object
      properties:
        message:
          type: string
          example: OTP has been sent to your phone
        otp_id:
          type: string
          format: uuid
          description: OTP record identifier to be passed to the verify step.
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
    ResendTransactionPinChangeOTPResponse:
      type: object
      properties:
        message:
          type: string
          example: OTP resent successfully
        otp_id:
          type: string
          format: uuid
          description: OTP record identifier (same as from the original request step).
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
    VerifyTransactionPinChangeOTPRequest:
      type: object
      required:
        - otp_id
        - otp_code
      properties:
        otp_id:
          type: string
          format: uuid
          description: OTP record identifier returned from the request step.
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        otp_code:
          type: string
          minLength: 6
          maxLength: 6
          description: 6-digit OTP sent to the user's phone.
          example: "123456"
    VerifyTransactionPinChangeOTPResponse:
      type: object
      properties:
        message:
          type: string
          example: OTP verified successfully
        verification_id:
          type: string
          format: uuid
          description: Verification identifier (valid for 15 minutes) to be passed to the change step.
          example: "f9e8d7c6-b5a4-3210-fedc-ba9876543210"
    ChangeTransactionPinRequest:
      type: object
      required:
        - verification_id
        - current_pin
        - new_pin
        - confirm_new_pin
      properties:
        verification_id:
          type: string
          format: uuid
          description: Verification identifier returned from the verify step. Valid for 15 minutes and single-use.
          example: "f9e8d7c6-b5a4-3210-fedc-ba9876543210"
        current_pin:
          type: string
          example: "1234"
        new_pin:
          type: string
          example: "4321"
        confirm_new_pin:
          type: string
          example: "4321"
    ChangePasswordRequest:
      type: object
      required:
        - verification_id
        - current_password
        - new_password
        - confirm_new_password
      properties:
        verification_id:
          type: string
          format: uuid
          example: b8fa4c0f-a086-4f9d-96db-3ac7457f6298
        current_password:
          type: string
          example: OldP@ssword1
        new_password:
          type: string
          minLength: 8
          example: NewP@ssword1
        confirm_new_password:
          type: string
          minLength: 8
          example: NewP@ssword1
