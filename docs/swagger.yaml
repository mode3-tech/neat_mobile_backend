  /notifications/send:
    post:
      tags:
        - Internal
      summary: Send notification internally
      description: |
        Internal endpoint used by trusted backend callers to create notification history, send Expo push messages,
        and persist accepted Expo ticket ids for later receipt polling. This endpoint is served under `/internal/v1`
        and is protected by HMAC headers.
      servers:
        - url: /internal/v1
      parameters:
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number for the embryo loan application summary list.
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
          description: Number of embryo loan application summaries to return per page.
        - in: header
          name: X-Timestamp
          required: true
          schema:
            type: string
            format: date-time
          description: RFC3339 timestamp used in the HMAC signing string.
        - in: header
          name: X-Signature
          required: true
          schema:
            type: string
          description: Lowercase hex HMAC-SHA256 signature of `METHOD + "\n" + PATH + "\n" + TIMESTAMP + "\n" + SHA256_HEX_OF_BODY` using `NOTIFICATION_INTERNAL_SECRET`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendNotificationRequest"
      responses:
        "200":
          description: Notification sent successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Invalid request body or missing required notification fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid internal HMAC headers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Upstream push delivery call failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Push sender is not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
