          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.access
        refresh_token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.refresh
        is_biometrics_enabled:
          type: boolean
          description: Whether biometric authentication is enabled for this user.
          example: true
        action_token:
          type: string
          description: Reserved for short-lived sensitive actions.
          example: ""
    NewDeviceRequest:
      type: object
      required:
        - session_token
