openapi: 3.0.3
info:
  title: Neat Mobile App Backend API
  version: 1.0.0
  description: |
    HTTP API for authentication, OTP workflows, and BVN/NIN validation.
servers:
  - url: /api/v1
tags:
  - name: Auth
    description: Authentication and identity endpoints
  - name: OTP
    description: OTP request and verification endpoints
  - name: Dev Signer
    description: Development-only signer helper endpoints for Postman/device simulation
paths:
  /auth/register:
    post:
      tags:
        - Auth
      summary: Register a user
      description: Creates a new account and binds the initial device in one transaction.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          description: Invalid request body or failed registration validation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Account or device already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Registration failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/login:
    post:
      tags:
        - Auth
      summary: Login a user
      description: |
        Authenticates a user by phone and password, then starts device verification flow.

        Current implementation note:
        when the response status is `new_device_detected`, login currently returns a `session_token`
        but does not dispatch an OTP automatically. OTP administration for new devices must be
        triggered by a follow-up integration step.
      parameters:
        - in: header
          name: X-Device-ID
          required: true
          schema:
            type: string
          description: Stable device installation identifier from the mobile app.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login initialized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginInitResponse'
              examples:
                challenge_required:
                  summary: Recognized trusted device
                  value:
                    status: challenge_required
                    challenge: V6Y0dxLF5leasw5ISJZgshZc8HP75fkQjwD8f2fOUeQ
                new_device_detected:
                  summary: New or untrusted device
                  value:
                    status: new_device_detected
                    session_token: CxDfs7E0ucjQ8v72n9v5M9o2xU4SyfV8h3caE6WvF1A
        '400':
          description: Invalid request body, invalid phone number, or missing/invalid device id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid phone or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Too many login attempts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Login initialization failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/verify-device:
    post:
      tags:
        - Auth
      summary: Verify device challenge
      description: Verifies a signed login challenge for a recognized trusted device and returns tokens.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyDeviceRequest'
      responses:
        '200':
          description: Device verification successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyDeviceResponse'
        '400':
          description: Invalid request body or missing challenge fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid challenge or signature verification failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Device verification failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /health:
    get:
      tags:
        - Dev Signer
      summary: Dev signer health check
      description: |
        Development-only endpoint served by `cmd/devsigner`.
      servers:
        - url: http://localhost:9090
      responses:
        '200':
          description: Signer is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DevHealthResponse'
  /sign:
    post:
      tags:
        - Dev Signer
      summary: Sign challenge (development only)
      description: |
        Development-only endpoint served by `cmd/devsigner` to help Postman flows.
        It signs challenge bytes using the configured Ed25519 private key for `device_id`.
      servers:
        - url: http://localhost:9090
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DevSignRequest'
      responses:
        '200':
          description: Challenge signed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DevSignResponse'
        '400':
          description: Invalid request body or missing fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Device key not found in signer configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/logout:
    post:
      tags:
        - Auth
      summary: Logout a user
      description: Revokes the current auth session and refresh token record.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Invalid request body or missing authorization header
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid authorization header
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Logout failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/refresh:
    post:
      tags:
        - Auth
      summary: Refresh access token
      description: Validates a refresh token, rotates it, and returns new access and refresh tokens.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Tokens refreshed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Refresh token missing or invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Token refresh failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/validate-bvn:
    post:
      tags:
        - Auth
      summary: Validate BVN
      description: Validates a BVN using the provider currently configured by CBA.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BVNValidationRequest'
      responses:
        '200':
          description: BVN validated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BVNValidationResponse'
        '400':
          description: Missing or invalid request body, invalid BVN, or provider validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: CBA lookup, provider, or internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/validate-nin:
    post:
      tags:
        - Auth
      summary: Validate NIN
      description: Validates a NIN using the configured NIN provider.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NINValidationRequest'
      responses:
        '200':
          description: NIN validated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NINValidationResponse'
        '400':
          description: Missing or invalid request body, invalid NIN, or provider validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Provider or internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/otp/request:
    post:
      tags:
        - OTP
      summary: Request OTP
      description: Sends an OTP for login, signup, or password reset via SMS or email.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestOTPRequest'
      responses:
        '200':
          description: OTP sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Invalid request body, purpose, channel, email, or phone number
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: SMS delivery failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: SMS service not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/otp/verify:
    post:
      tags:
        - OTP
      summary: Verify OTP
      description: Verifies a previously issued OTP.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyOTPRequest'
      responses:
        '200':
          description: OTP verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyOTPResponse'
        '400':
          description: Invalid request body, purpose, or channel
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid OTP
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    DevHealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
    DevSignRequest:
      type: object
      required:
        - device_id
        - challenge
      properties:
        device_id:
          type: string
          example: sim-device-1
        challenge:
          type: string
          example: V6Y0dxLF5leasw5ISJZgshZc8HP75fkQjwD8f2fOUeQ
    DevSignResponse:
      type: object
      required:
        - signature
        - algorithm
      properties:
        signature:
          type: string
          description: Base64url-encoded Ed25519 signature
          example: oNhX2iID6_IzXA0s-mSI7RTpf-ooGA5ScVHMqFUdd3xT1LQVnvvH5ugaU7U09KSZ37pqeuYoHSc1wZvKk2V6AA
        algorithm:
          type: string
          example: ed25519
    DeviceRegistrationRequest:
      type: object
      required:
        - device_id
        - public_key
        - device_name
        - device_model
        - os
        - os_version
        - app_version
        - ip
        - user_agent
      properties:
        device_id:
          type: string
          example: app-installation-id
        public_key:
          type: string
          example: yMK6+dd12JqQtw6Ts5nF7gxjMe6VQ7n1xNlwLWmk/yI=
        device_name:
          type: string
          example: John's iPhone
        device_model:
          type: string
          example: iPhone 15
        os:
          type: string
          example: iOS
        os_version:
          type: string
          example: "18.2"
        app_version:
          type: string
          example: 1.0.0
        ip:
          type: string
          example: 127.0.0.1
        user_agent:
          type: string
          example: NeatApp/1.0
    RegisterRequest:
      type: object
      required:
        - phone_number
        - password
        - confirm_password
        - transaction_pin
        - confirm_transaction_pin
        - bvn_verification_id
        - nin_verification_id
        - phone_verification_id
        - device
      properties:
        phone_number:
          type: string
          example: "08012345678"
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          minLength: 8
          example: your-password
        confirm_password:
          type: string
          minLength: 8
          example: your-password
        transaction_pin:
          type: string
          minLength: 4
          maxLength: 6
          example: "1234"
        confirm_transaction_pin:
          type: string
          minLength: 4
          maxLength: 6
          example: "1234"
        bvn_verification_id:
          type: string
          example: b8fa4c0f-a086-4f9d-96db-3ac7457f6298
        nin_verification_id:
          type: string
          example: b8fa4c0f-a086-4f9d-96db-3ac7457f6298
        phone_verification_id:
          type: string
          example: b8fa4c0f-a086-4f9d-96db-3ac7457f6298
        email_verification_id:
          type: string
          example: b8fa4c0f-a086-4f9d-96db-3ac7457f6298
        device:
          $ref: '#/components/schemas/DeviceRegistrationRequest'
    RegisterResponse:
      type: object
      required:
        - message
        - access_token
        - refresh_token
      properties:
        message:
          type: string
          example: registration successful
        access_token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.access
        refresh_token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.refresh
    LoginRequest:
      type: object
      required:
        - phone
        - password
      properties:
        phone:
          type: string
          example: "08012345678"
        password:
          type: string
          minLength: 8
          example: your-password
    LoginInitResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - challenge_required
            - new_device_detected
          example: challenge_required
        challenge:
          type: string
          description: Present when status is challenge_required.
          example: V6Y0dxLF5leasw5ISJZgshZc8HP75fkQjwD8f2fOUeQ
        session_token:
          type: string
          description: Present when status is new_device_detected. OTP dispatch for this path is not yet automatic.
          example: CxDfs7E0ucjQ8v72n9v5M9o2xU4SyfV8h3caE6WvF1A
    LoginResponse:
      type: object
      properties:
        access_token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.access
        refresh_token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.refresh
    VerifyDeviceRequest:
      type: object
      required:
        - challenge
        - signature
        - device_id
      properties:
        challenge:
          type: string
          description: Raw challenge value returned by /auth/login.
          example: V6Y0dxLF5leasw5ISJZgshZc8HP75fkQjwD8f2fOUeQ
        signature:
          type: string
          description: Signature over challenge bytes from the device private key.
          example: ELSgo8lWnShQUe7J79hYUf-TQqfivhBpJeIhP_AfDDeL4mQQQZAoqfCD7YLI7hRQelFWDk1f6v4CyLt2vAUyDg
        device_id:
          type: string
          description: Device identifier used during login initialization.
          example: app-installation-id
    VerifyDeviceResponse:
      type: object
      required:
        - status
        - access_token
        - refresh_token
      properties:
        status:
          type: string
          example: success
        access_token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.access
        refresh_token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.refresh
        action_token:
          type: string
          description: Reserved for short-lived sensitive actions.
          example: ""
    LogoutRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.refresh
    RefreshTokenRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.refresh
    BVNValidationRequest:
      type: object
      required:
        - bvn
      properties:
        bvn:
          type: string
          minLength: 11
          maxLength: 11
          example: "12345678901"
    BVNValidationResponse:
      type: object
      properties:
        name:
          type: string
          example: Jane Doe
        dob:
          type: string
          example: "1994-01-02"
        phone_number:
          type: string
          example: "08012345678"
        verification_id:
          type: string
          example: b8fa4c0f-a086-4f9d-96db-3ac7457f6298
    NINValidationRequest:
      type: object
      required:
        - nin
      properties:
        nin:
          type: string
          minLength: 11
          maxLength: 11
          example: "12345678901"
    NINValidationResponse:
      type: object
      properties:
        name:
          type: string
          example: Jane Doe
        dob:
          type: string
          example: "1994-01-02"
        phone_number:
          type: string
          example: "08012345678"
        verification_id:
          type: string
          example: b8fa4c0f-a086-4f9d-96db-3ac7457f6298
    RequestOTPRequest:
      type: object
      required:
        - purpose
        - channel
        - destination
      properties:
        purpose:
          type: string
          enum:
            - login
            - signup
            - password_reset
          example: login
        channel:
          type: string
          enum:
            - sms
            - email
          example: email
        destination:
          type: string
          example: user@example.com
    VerifyOTPRequest:
      type: object
      required:
        - purpose
        - channel
        - destination
        - otp
      properties:
        purpose:
          type: string
          enum:
            - login
            - signup
            - password_reset
          example: login
        channel:
          type: string
          enum:
            - sms
            - email
          example: email
        destination:
          type: string
          example: user@example.com
        otp:
          type: string
          minLength: 6
          maxLength: 6
          example: "123456"
    VerifyOTPResponse:
      type: object
      properties:
        message:
          type: string
          example: OTP verification was successful
        verification_id:
          type: string
          example: b8fa4c0f-a086-4f9d-96db-3ac7457f6298
    MessageResponse:
      type: object
      properties:
        message:
          type: string
          example: otp sent
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: invalid request body
