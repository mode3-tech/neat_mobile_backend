openapi: 3.0.3
info:
  title: Neat Mobile App Backend API
  version: 1.0.0
  description: |
    HTTP API for authentication, OTP verification, device trust, identity validation,
    password reset, and loan product workflows.
servers:
  - url: /api/v1
tags:
  - name: Auth
    description: Authentication and identity endpoints
  - name: OTP
    description: OTP request and verification endpoints
  - name: Loan
    description: Protected loan product discovery and application endpoints
  - name: Dev Signer
    description: Development-only signer helper endpoints for Postman/device simulation
paths:
  /auth/register:
    post:
      tags:
        - Auth
      summary: Register a user
      description: Creates a new account and binds the initial device in one transaction. The server captures the client IP from the request metadata and stores it with the created auth session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
        "400":
          description: Invalid request body or failed registration validation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Account or device already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Registration failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/login:
    post:
      tags:
        - Auth
      summary: Login a user
      description: |
        Authenticates a user by phone and password, then starts device verification flow.
        The server evaluates the submitted `X-Device-ID` against the authenticated user's stored devices.
        If that device exists and is both active and trusted, returns `challenge_required`.
        If the device is missing, inactive, or untrusted, returns `new_device_detected`, sends a login OTP to the user's
        phone number, and returns a `session_token` for `/auth/verify-new-device`.
      parameters:
        - in: header
          name: X-Device-ID
          required: true
          schema:
            type: string
          description: Stable device installation identifier from the mobile app, used to look up device trust for the account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login initialized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginInitResponse"
              examples:
                challenge_required:
                  summary: Recognized trusted device
                  value:
                    status: challenge_required
                    challenge: V6Y0dxLF5leasw5ISJZgshZc8HP75fkQjwD8f2fOUeQ
                new_device_detected:
                  summary: Device missing, inactive, or untrusted
                  value:
                    status: new_device_detected
                    session_token: CxDfs7E0ucjQ8v72n9v5M9o2xU4SyfV8h3caE6WvF1A
        "400":
          description: Invalid request body, invalid phone number, or missing/invalid device id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid phone or password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Too many login attempts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Login initialization failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/verify-device:
    post:
      tags:
        - Auth
      summary: Verify device challenge
      description: Verifies a signed login challenge for a recognized trusted device and returns tokens.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyDeviceRequest"
      responses:
        "200":
          description: Device verification successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyDeviceResponse"
        "400":
          description: Invalid request body or missing challenge fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid challenge or signature verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Device verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/verify-new-device:
    post:
      tags:
        - Auth
      summary: Verify new device with OTP
      description: |
        Completes login when the submitted `X-Device-ID` from `/auth/login` was not found as an
        active trusted device, using the `session_token` returned by `/auth/login` and the OTP sent
        during `new_device_detected` flow.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewDeviceRequest"
      responses:
        "200":
          description: New device verified and tokens issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyDeviceResponse"
        "400":
          description: Invalid request body or missing required fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid/expired session token or invalid OTP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: New-device verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /health:
    get:
      tags:
        - Dev Signer
      summary: Dev signer health check
      description: |
        Development-only endpoint served by `cmd/devsigner`.
      servers:
        - url: http://localhost:9090
      responses:
        "200":
          description: Signer is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DevHealthResponse"
  /sign:
    post:
      tags:
        - Dev Signer
      summary: Sign challenge (development only)
      description: |
        Development-only endpoint served by `cmd/devsigner` to help Postman flows.
        It signs `SHA-256(challenge)` using the configured ECDSA P-256 private key for `device_id`.
      servers:
        - url: http://localhost:9090
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DevSignRequest"
      responses:
        "200":
          description: Challenge signed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DevSignResponse"
        "400":
          description: Invalid request body or missing fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Device key not found in signer configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/logout:
    post:
      tags:
        - Auth
      summary: Logout a user
      description: Revokes the current auth session and refresh token record.
      parameters:
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
          description: "Bearer access token. Example: `Bearer <access_token>`."
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
      responses:
        "200":
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Invalid request body or missing authorization header
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid authorization header
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Logout failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/refresh:
    post:
      tags:
        - Auth
      summary: Refresh access token
      description: Validates a refresh token and device binding from request body, rotates the refresh token, and returns new access and refresh tokens.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: Tokens refreshed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          description: Missing refresh token/device id or invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Token refresh failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/validate-bvn:
    post:
      tags:
        - Auth
      summary: Validate BVN
      description: Validates a BVN using Tendar only. Provider preference from CBA is ignored for this endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BVNValidationRequest"
      responses:
        "200":
          description: BVN validated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BVNValidationResponse"
        "400":
          description: Missing or invalid request body, invalid BVN, or provider validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Upstream service unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "504":
          description: Upstream service timed out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: CBA lookup, provider, or internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/validate-nin:
    post:
      tags:
        - Auth
      summary: Validate NIN
      description: Validates a NIN using the configured NIN provider and compares it with a previously verified BVN using `bvn_validation_id`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NINValidationRequest"
      responses:
        "200":
          description: NIN validated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NINValidationResponse"
        "400":
          description: Missing or invalid request body, invalid NIN, or provider validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Upstream service unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "504":
          description: Upstream service timed out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Provider or internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/forgot-password:
    post:
      tags:
        - Auth
      summary: Request password reset OTP
      description: Sends a password reset OTP to the account phone number for a recognized device.
      parameters:
        - in: header
          name: X-Device-ID
          required: true
          schema:
            type: string
          description: Registered device identifier for the account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
      responses:
        "200":
          description: Password reset OTP sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Account not found for phone number or device not recognized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to create or send password reset OTP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/reset-password:
    post:
      tags:
        - Auth
      summary: Reset password with OTP
      description: Verifies a password reset OTP, marks it as used, and updates the user's password hash.
      parameters:
        - in: header
          name: X-Device-ID
          required: true
          schema:
            type: string
          description: Registered device identifier for the account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "200":
          description: Password reset successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Invalid request body, missing reset code, or invalid password format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid device id, reset code, or user context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Password reset failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/otp/request:
    post:
      tags:
        - OTP
      summary: Request OTP
      description: Sends an OTP for login, signup, or password reset via SMS or email.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestOTPRequest"
      responses:
        "200":
          description: OTP sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Invalid request body, purpose, channel, email, or phone number
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: SMS delivery failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: SMS service not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/otp/verify:
    post:
      tags:
        - OTP
      summary: Verify OTP
      description: Verifies a previously issued OTP.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyOTPRequest"
      responses:
        "200":
          description: OTP verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyOTPResponse"
        "400":
          description: Invalid request body, purpose, or channel
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid OTP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /loan/:
    get:
      tags:
        - Loan
      summary: List loan products
      description: Returns the currently available loan products from storage.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Loan products fetched successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoanProductsResponse"
        "401":
          description: Missing or invalid access token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to fetch loan products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /loan/apply:
    post:
      tags:
        - Loan
      summary: Apply for a loan
      description: |
        Creates a pending loan application for the authenticated user after validating
        the selected product, business data, user verification state, and core-banking loan checks.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoanApplicationRequest"
      responses:
        "200":
          description: Loan application created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoanApplicationResponse"
        "400":
          description: Invalid request body or malformed input fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid access token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Current user or loan rule not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Multiple core-banking customers matched the supplied BVN
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: User or application data failed business-rule validation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Core-banking lookup failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Core-banking integration is unavailable or not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Loan application failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    DevHealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
    DevSignRequest:
      type: object
      required:
        - device_id
        - challenge
      properties:
        device_id:
          type: string
          example: sim-device-1
        challenge:
          type: string
          example: V6Y0dxLF5leasw5ISJZgshZc8HP75fkQjwD8f2fOUeQ
    DevSignResponse:
      type: object
      required:
        - signature
        - algorithm
      properties:
        signature:
          type: string
          description: Base64url-encoded ECDSA P-256 signature (ASN.1 DER) over SHA-256(challenge)
          example: MEUCIG4lQ0A5Wc1zN8hP8o2N2iU9V3gT0E2q9r2m1kYzv1U-AiEAz8r8Jt2s2l7cQwZ9k0IY3l8Gx6b4u5m8N9p0Q1r2s3A
        algorithm:
          type: string
          example: ecdsa-p256-sha256
    DeviceRegistrationRequest:
      type: object
      required:
        - device_id
        - public_key
        - device_name
        - device_model
        - os
        - os_version
        - app_version
      properties:
        device_id:
          type: string
          example: app-installation-id
        public_key:
          type: string
          example: yMK6+dd12JqQtw6Ts5nF7gxjMe6VQ7n1xNlwLWmk/yI=
        device_name:
          type: string
          example: John's iPhone
        device_model:
          type: string
          example: iPhone 15
        os:
          type: string
          example: iOS
        os_version:
          type: string
          example: "18.2"
        app_version:
          type: string
          example: 1.0.0
    RegisterRequest:
      type: object
      required:
        - phone_number
        - password
        - confirm_password
        - transaction_pin
        - confirm_transaction_pin
        - bvn_verification_id
        - nin_verification_id
        - phone_verification_id
        - is_biometrics_enabled
        - device
      properties:
        phone_number:
          type: string
          description: Nigerian phone number. Accepted local or international forms are normalized server-side.
          example: "08012345678"
        email:
          type: string
          format: email
          description: Optional email address. When supplied, pair it with `email_verification_id`.
          example: user@example.com
        password:
          type: string
          minLength: 8
          example: your-password
        confirm_password:
          type: string
          minLength: 8
          example: your-password
        transaction_pin:
          type: string
          minLength: 4
          maxLength: 6
          example: "1234"
        confirm_transaction_pin:
          type: string
          minLength: 4
          maxLength: 6
          example: "1234"
        bvn_verification_id:
          type: string
          example: b8fa4c0f-a086-4f9d-96db-3ac7457f6298
        nin_verification_id:
          type: string
          example: b8fa4c0f-a086-4f9d-96db-3ac7457f6298
        phone_verification_id:
          type: string
          example: b8fa4c0f-a086-4f9d-96db-3ac7457f6298
        email_verification_id:
          type: string
          description: Verification ID returned by `/auth/otp/verify` for the optional email step.
          example: b8fa4c0f-a086-4f9d-96db-3ac7457f6298
        is_biometrics_enabled:
          type: boolean
          example: true
        device:
          $ref: "#/components/schemas/DeviceRegistrationRequest"
    RegisterResponse:
      type: object
      required:
        - message
        - access_token
        - refresh_token
      properties:
        message:
          type: string
          example: registration successful
        access_token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.access
        refresh_token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.refresh
    LoginRequest:
      type: object
      required:
        - phone
        - password
      properties:
        phone:
          type: string
          example: "08012345678"
        password:
          type: string
          minLength: 8
          example: your-password
    LoginInitResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - challenge_required
            - new_device_detected
          example: challenge_required
        challenge:
          type: string
          description: Present when status is challenge_required.
          example: V6Y0dxLF5leasw5ISJZgshZc8HP75fkQjwD8f2fOUeQ
        session_token:
          type: string
          description: Present when status is new_device_detected because the submitted X-Device-ID was not an active trusted device; use this with OTP at /auth/verify-new-device.
          example: CxDfs7E0ucjQ8v72n9v5M9o2xU4SyfV8h3caE6WvF1A
    LoginResponse:
      type: object
      properties:
        access_token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.access
        refresh_token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.refresh
    VerifyDeviceRequest:
      type: object
      required:
        - challenge
        - signature
        - device_id
      properties:
        challenge:
          type: string
          description: Raw challenge value returned by /auth/login.
          example: V6Y0dxLF5leasw5ISJZgshZc8HP75fkQjwD8f2fOUeQ
        signature:
          type: string
          description: Signature over challenge bytes from the device private key.
          example: ELSgo8lWnShQUe7J79hYUf-TQqfivhBpJeIhP_AfDDeL4mQQQZAoqfCD7YLI7hRQelFWDk1f6v4CyLt2vAUyDg
        device_id:
          type: string
          description: Device identifier used during login initialization.
          example: app-installation-id
    VerifyDeviceResponse:
      type: object
      required:
        - status
        - access_token
        - refresh_token
      properties:
        status:
          type: string
          example: success
        access_token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.access
        refresh_token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.refresh
        action_token:
          type: string
          description: Reserved for short-lived sensitive actions.
          example: ""
    NewDeviceRequest:
      type: object
      required:
        - session_token
        - otp
        - device
      properties:
        session_token:
          type: string
          description: Session token returned from /auth/login when status is new_device_detected.
          example: CxDfs7E0ucjQ8v72n9v5M9o2xU4SyfV8h3caE6WvF1A
        otp:
          type: string
          minLength: 6
          maxLength: 6
          example: "123456"
        device:
          $ref: "#/components/schemas/DeviceRegistrationRequest"
    LogoutRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.refresh
    RefreshTokenRequest:
      type: object
      required:
        - device_id
        - refresh_token
      properties:
        device_id:
          type: string
          example: app-installation-id
        refresh_token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.refresh
    ForgotPasswordRequest:
      type: object
      required:
        - phone
      properties:
        phone:
          type: string
          example: "08012345678"
    ResetPasswordRequest:
      type: object
      required:
        - reset_code
        - password
      properties:
        reset_code:
          type: string
          minLength: 6
          maxLength: 6
          example: "123456"
        password:
          type: string
          minLength: 8
          example: NewStrongP@ss1
    BVNValidationRequest:
      type: object
      required:
        - bvn
      properties:
        bvn:
          type: string
          minLength: 11
          maxLength: 11
          example: "12345678901"
    BVNValidationResponse:
      type: object
      properties:
        name:
          type: string
          example: Jane Doe
        dob:
          type: string
          example: "1994-01-02"
        phone_number:
          type: string
          example: "08012345678"
        verification_id:
          type: string
          example: b8fa4c0f-a086-4f9d-96db-3ac7457f6298
    NINValidationRequest:
      type: object
      required:
        - nin
        - bvn_validation_id
      properties:
        nin:
          type: string
          minLength: 11
          maxLength: 11
          example: "12345678901"
        bvn_validation_id:
          type: string
          example: b8fa4c0f-a086-4f9d-96db-3ac7457f6298
    LoanProductCode:
      type: string
      enum:
        - BUSINESS-WK
        - SPECIAL-WK
        - SME-WK
        - SALARY-MTH
        - INDIVIDUAL-WK
        - GROUP-WK
      example: SME-WK
    LoanFrequency:
      type: string
      enum:
        - weekly
        - monthly
      example: weekly
    LoanStatus:
      type: string
      enum:
        - pending
        - reviewed
        - approved
        - rejected
        - converted_to_loan
      example: pending
    LoanProduct:
      type: object
      properties:
        id:
          type: string
          example: 8a732d01-63fb-4e68-bfc8-7d69c7c4157e
        code:
          $ref: "#/components/schemas/LoanProductCode"
        name:
          type: string
          example: SME Loan
        description:
          type: string
          example: Loan product for small,medium enterprise
        min_loan_amount:
          type: integer
          format: int64
          example: 200000
        max_loan_amount:
          type: integer
          format: int64
          example: 5000000
        interest_rate_bps:
          type: integer
          description: The current loan summary calculation treats this value as a percentage, so `24` means `24%`.
          example: 24
        repayment_frequency:
          $ref: "#/components/schemas/LoanFrequency"
        grace_period_days:
          type: integer
          example: 3
        loan_term_value:
          type: integer
          example: 24
        late_penalty_bps:
          type: integer
          example: 250
        allows_concurrent_loans:
          type: boolean
          nullable: true
          example: false
        is_active:
          type: boolean
          nullable: true
          example: true
    LoanProductsResponse:
      type: object
      required:
        - message
        - products
      properties:
        message:
          type: string
          example: loan products fetch was successful
        products:
          type: array
          items:
            $ref: "#/components/schemas/LoanProduct"
    LoanApplicationRequest:
      type: object
      required:
        - loan_product_type
        - business_address
        - business_start_date
        - business_value
        - business_type
        - loan_amount
      properties:
        loan_product_type:
          $ref: "#/components/schemas/LoanProductCode"
        business_address:
          type: string
          example: 12 Market Road, Lagos
        business_start_date:
          type: string
          description: Business start month in `YYYY-MM` format.
          example: "2022-01"
        business_value:
          type: string
          description: Digits-only business value string.
          example: "5000000"
        business_type:
          type: string
          example: retail
        loan_amount:
          type: string
          description: Digits-only loan amount string.
          example: "250000"
    LoanSummaryResponse:
      type: object
      properties:
        business_value:
          type: integer
          format: int64
          example: 5000000
        business_age_years:
          type: integer
          example: 3
        loan_amount:
          type: integer
          format: int64
          example: 250000
        interest_rate_percent:
          type: number
          format: double
          example: 24
        interest_amount:
          type: number
          format: double
          example: 60000
        total_repayment:
          type: number
          format: double
          example: 310000
        periodic_repayment:
          type: number
          format: double
          example: 12916.67
        loan_term_value:
          type: integer
          example: 24
        repayment_frequency:
          $ref: "#/components/schemas/LoanFrequency"
        is_estimate:
          type: boolean
          example: true
    LoanApplicationResponse:
      type: object
      required:
        - message
        - application_ref
        - loan_status
        - summary
      properties:
        message:
          type: string
          example: loan application was successful
        application_ref:
          type: string
          example: 0ae0d8ef-5a60-4e18-9527-b96abd2d4731
        loan_status:
          $ref: "#/components/schemas/LoanStatus"
        summary:
          $ref: "#/components/schemas/LoanSummaryResponse"
    NINValidationResponse:
      type: object
      properties:
        name:
          type: string
          example: Jane Doe
        dob:
          type: string
          example: "1994-01-02"
        phone_number:
          type: string
          example: "08012345678"
        verification_id:
          type: string
          example: b8fa4c0f-a086-4f9d-96db-3ac7457f6298
    RequestOTPRequest:
      type: object
      required:
        - purpose
        - channel
        - destination
      properties:
        purpose:
          type: string
          enum:
            - login
            - signup
            - password_reset
          example: login
        channel:
          type: string
          enum:
            - sms
            - email
          example: email
        destination:
          type: string
          example: user@example.com
    VerifyOTPRequest:
      type: object
      required:
        - purpose
        - channel
        - destination
        - otp
      properties:
        purpose:
          type: string
          enum:
            - login
            - signup
            - password_reset
          example: login
        channel:
          type: string
          enum:
            - sms
            - email
          example: email
        destination:
          type: string
          example: user@example.com
        otp:
          type: string
          minLength: 6
          maxLength: 6
          example: "123456"
    VerifyOTPResponse:
      type: object
      properties:
        message:
          type: string
          example: OTP verification was successful
        verification_id:
          type: string
          example: b8fa4c0f-a086-4f9d-96db-3ac7457f6298
    MessageResponse:
      type: object
      properties:
        message:
          type: string
          example: otp sent
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: invalid request body
        request_id:
          type: string
          description: Correlation identifier included in responses for request tracing.
          example: 9c16f4c6-238d-4872-a328-8200e5a916d1
