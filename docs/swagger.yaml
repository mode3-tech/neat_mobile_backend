components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    GetUserSavingsResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        message:
          type: string
          example: User's goals fetched successfully
        goals:
          type: array
          items:
            $ref: "#/components/schemas/UserGoalInfo"
    UserGoalInfo:
      type: object
      properties:
        goal_id:
          type: string
          example: "3f7b1c2a-..."
