        - in: header
          name: Authorization
          required: true
          schema:
            type: string
          description: "Bearer access token. Example: `Bearer <access_token>`."
        - in: header
          name: X-Device-ID
          required: true
          schema:
            type: string
          description: Registered device identifier for the account.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangeTransactionPinRequest"
      responses:
        "200":
          description: Transaction PIN changed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Device id required, verification id required, pin validation failed, current pin wrong, or pins don't match
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Device not found, device not allowed, invalid verification id, verification id expired, or user not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
