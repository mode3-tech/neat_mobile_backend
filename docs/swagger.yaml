          example: "2026-03-23T10:00:00Z"
        read_at:
          type: string
          format: date-time
          nullable: true
          example: "2026-03-23T10:05:00Z"
    NotificationsListResponse:
      type: object
      required:
        - notifications
        - page
        - page_size
        - total
        - has_next
      properties:
        notifications:
          type: array
          items:
            $ref: "#/components/schemas/NotificationHistoryItem"
        page:
          type: integer
          example: 1
        page_size:
          type: integer
          example: 20
        total:
          type: integer
          format: int64
          example: 37
        has_next:
          type: boolean
          example: true
    UnreadCountResponse:
      type: object
      required:
        - count
      properties:
        count:
          type: integer
          example: 5
    NotificationReadResponse:
      type: object
      required:
        - message
        - updated
      properties:
        message:
          type: string
          example: notification updated
        updated:
          type: boolean
          example: true
    NotificationsReadAllResponse:
      type: object
      required:
        - message
        - updated
      properties:
        message:
          type: string
          example: notifications updated
        updated:
          type: integer
          format: int64
          example: 12
    MessageResponse:
      type: object
      properties:
        message:
          type: string
          example: otp sent
    TransactionItem:
      type: object
      required:
        - id
        - type
        - description
        - date
        - status
        - amount
      properties:
        id:
          type: string
          example: 3f7a1c2e-d84b-4f90-a3c1-2e5b6d8f0a1c
        type:
          type: string
          enum:
            - credit
            - debit
          example: credit
        description:
          type: string
          example: Transfer from John Doe
        date:
          type: string
          format: date-time
          example: "2026-04-03T14:22:00+01:00"
        status:
          type: string
          enum:
            - pending
            - successful
            - failed
            - reversed
          example: successful
        amount:
          type: integer
          format: int64
          description: Amount in the smallest currency unit (kobo).
          example: 500000
    FetchRecentTransactionsResponse:
      type: object
      properties:
        status:
          type: boolean
          example: true
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/TransactionItem"
    TransactionSection:
      type: object
      description: A group of transactions belonging to a single calendar month.
      properties:
        month:
          type: string
          description: Human-readable month label.
          example: April 2026
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/TransactionItem"
    PagedTransactionResponse:
      type: object
      properties:
        status:
          type: boolean
          example: true
        sections:
          type: array
          description: Transactions grouped by month, ordered newest-first.
          items:
            $ref: "#/components/schemas/TransactionSection"
        next_cursor:
          type: string
          format: date-time
          description: RFC3339 timestamp to pass as `cursor` on the next request. Empty string when there are no more pages.
          example: "2026-03-01T00:00:00Z"
        has_more:
          type: boolean
          description: True if there are additional pages of transactions available.
          example: true
    ResetTransactionPinRequest:
      type: object
      required:
        - otp_code
        - new_pin
        - confirm_new_pin
      properties:
        otp_code:
          type: string
          minLength: 6
          maxLength: 6
          example: "123456"
        new_pin:
          type: string
          example: "4321"
        confirm_new_pin:
          type: string
          example: "4321"
    RequestTransactionPinChangeResponse:
      type: object
      properties:
        message:
          type: string
          example: OTP has been sent to your phone
        otp_id:
          type: string
          format: uuid
          description: OTP record identifier to be passed to the verify step.
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
    ResendTransactionPinChangeOTPResponse:
      type: object
      properties:
        message:
          type: string
          example: OTP resent successfully
        otp_id:
          type: string
          format: uuid
          description: OTP record identifier (same as from the original request step).
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
    VerifyTransactionPinChangeOTPRequest:
      type: object
      required:
        - otp_id
        - otp_code
      properties:
        otp_id:
          type: string
          format: uuid
          description: OTP record identifier returned from the request step.
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        otp_code:
          type: string
          minLength: 6
          maxLength: 6
          description: 6-digit OTP sent to the user's phone.
          example: "123456"
    VerifyTransactionPinChangeOTPResponse:
      type: object
      properties:
        message:
          type: string
          example: OTP verified successfully
        verification_id:
          type: string
          format: uuid
          description: Verification identifier (valid for 15 minutes) to be passed to the change step.
          example: "f9e8d7c6-b5a4-3210-fedc-ba9876543210"
    ChangeTransactionPinRequest:
      type: object
      required:
        - verification_id
        - current_pin
        - new_pin
        - confirm_new_pin
      properties:
        verification_id:
          type: string
          format: uuid
          description: Verification identifier returned from the verify step. Valid for 15 minutes and single-use.
          example: "f9e8d7c6-b5a4-3210-fedc-ba9876543210"
        current_pin:
          type: string
          example: "1234"
        new_pin:
          type: string
          example: "4321"
        confirm_new_pin:
          type: string
          example: "4321"
    ChangePasswordRequest:
      type: object
      required:
        - otp_code
        - current_password
        - new_password
        - confirm_new_password
      properties:
        otp_code:
          type: string
          minLength: 6
          maxLength: 6
          example: "123456"
        current_password:
          type: string
          example: OldP@ssword1
        new_password:
          type: string
          minLength: 8
          example: NewP@ssword1
        confirm_new_password:
          type: string
          minLength: 8
          example: NewP@ssword1
    ProvidusCreditPayload:
      type: object
      properties:
        accountNumber:
          type: string
          example: "1234567890"
        transactionAmount:
          type: string
          example: "5000.00"
        settledAmount:
          type: string
          example: "5000.00"
        currency:
          type: string
          example: NGN
        tranType:
          type: string
          example: C
        tranRemarks:
          type: string
          example: Transfer from John Doe
        tranDate:
          type: string
          example: "2026-04-03T14:22:00"
        sessionId:
          type: string
          example: "090405240115103012345678901234"
        tranId:
          type: string
          example: FT26094123456
        initiationTranRef:
          type: string
          example: NXG20260403142200
        originatorAccountName:
          type: string
          example: JOHN DOE
        originatorAccountNumber:
          type: string
          example: "0123456789"
        beneficiaryAccountName:
          type: string
          example: JANE DOE
        beneficiaryAccountNumber:
          type: string
          example: "1234567890"
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: invalid request body
        request_id:
          type: string
          description: Correlation identifier included in responses for request tracing.
          example: 9c16f4c6-238d-4872-a328-8200e5a916d1
