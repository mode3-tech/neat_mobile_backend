              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized or missing device ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to fetch beneficiaries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /transaction/recent:
    get:
      tags:
        - Transaction
      summary: Fetch recent transactions
      description: Returns the most recent transactions for the authenticated user's wallet.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Recent transactions fetched successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FetchRecentTransactionsResponse"
        "401":
          description: Unauthorized or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to fetch transactions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /transaction/all:
    get:
      tags:
        - Transaction
      summary: Fetch all transactions (paginated)
      description: |
        Returns all transactions for the authenticated user's wallet, grouped by
        month and paginated via a cursor. Pass the `next_cursor` from the previous
        response as the `cursor` query parameter to fetch the next page. Omit
        `cursor` on the first request.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: limit
          required: true
          schema:
            type: integer
            example: 20
          description: Number of transactions to return per page.
        - in: query
          name: cursor
          required: false
          schema:
            type: string
            format: date-time
            example: "2026-04-01T00:00:00Z"
          description: RFC3339 timestamp cursor from the previous page's `next_cursor`. Omit on the first request.
      responses:
        "200":
          description: Transactions fetched successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedTransactionResponse"
        "400":
          description: Missing or invalid query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to fetch transactions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /webhooks/providus/credit:
    post:
      tags:
        - Webhook
      summary: Providus credit notification
      description: |
        Receives inbound credit notifications from Providus when money lands on a
        user's virtual account. Protected by a shared secret sent in the
        `X-Notification-Secret` header. Always returns 200 — errors are logged
        internally and do not trigger Providus retries.
      servers:
        - url: /
      parameters:
        - in: header
          name: X-Notification-Secret
          required: true
          schema:
            type: string
          description: Shared secret configured with Providus to authenticate inbound webhook calls.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProvidusCreditPayload"
      responses:
        "200":
          description: Notification acknowledged
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
        "401":
          description: Missing or invalid notification secret
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /cba/loan-applications:
    get:
      tags:
        - Internal
      summary: Get latest embryo loan application for a user
      description: |
        Returns the most recent loan application for the supplied wallet user id
        where either the loan status is `embryo` or the customer status is
        `embryo`.
        This endpoint is served under `/internal/v1` and is protected by HMAC headers.
      servers:
        - url: /internal/v1
      parameters:
        - in: query
          name: user_id
          required: true
          schema:
            type: string
          description: Wallet mobile user id to look up.
        - in: header
          name: X-Timestamp
          required: true
          schema:
            type: string
            format: date-time
          description: RFC3339 timestamp used in the HMAC signing string. Must be within five minutes of server time.
        - in: header
          name: X-Signature
          required: true
          schema:
            type: string
          description: Lowercase hex HMAC-SHA256 signature of `METHOD + "\n" + PATH + "\n" + TIMESTAMP + "\n" + SHA256_HEX_OF_BODY` using `CBA_WEBHOOK_SECRET`.
      responses:
        "200":
          description: Latest embryo loan application fetched successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalLoanApplicationsResponse"
        "400":
          description: Missing or invalid user id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid internal HMAC headers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal auth is not configured or the fetch failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /cba/loan-applications/embryo:
    get:
      tags:
        - Internal
      summary: List embryo loan application summaries
      description: |
        Returns applicant summaries for rows where either the loan status is
        `embryo` or the customer status is `embryo`, for internal CBA consumption.
        This endpoint is served under `/internal/v1` and is protected by HMAC headers.
      servers:
        - url: /internal/v1
      parameters:
        - in: header
          name: X-Timestamp
          required: true
          schema:
            type: string
            format: date-time
          description: RFC3339 timestamp used in the HMAC signing string. Must be within five minutes of server time.
        - in: header
          name: X-Signature
          required: true
          schema:
            type: string
          description: Lowercase hex HMAC-SHA256 signature of `METHOD + "\n" + PATH + "\n" + TIMESTAMP + "\n" + SHA256_HEX_OF_BODY` using `CBA_WEBHOOK_SECRET`.
      responses:
        "200":
          description: Embryo loan application summaries fetched successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalEmbryoLoanApplicationsResponse"
        "400":
          description: Invalid pagination query params
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid internal HMAC headers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal auth is not configured or the fetch failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /cba/loan-applications/{application_ref}:
    get:
      tags:
        - Internal
      summary: Get loan application by reference for CBA
      description: |
        Returns one locally stored loan application by `application_ref`.
        This endpoint is served under `/internal/v1` and is protected by HMAC headers.
      servers:
        - url: /internal/v1
      parameters:
        - in: path
          name: application_ref
          required: true
          schema:
            type: string
          description: Local loan application reference.
        - in: header
          name: X-Timestamp
          required: true
          schema:
            type: string
            format: date-time
          description: RFC3339 timestamp used in the HMAC signing string. Must be within five minutes of server time.
        - in: header
          name: X-Signature
          required: true
          schema:
            type: string
          description: Lowercase hex HMAC-SHA256 signature of `METHOD + "\n" + PATH + "\n" + TIMESTAMP + "\n" + SHA256_HEX_OF_BODY` using `CBA_WEBHOOK_SECRET`.
      responses:
        "200":
          description: Loan application fetched successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalLoanApplicationResponse"
        "400":
          description: Missing or invalid application reference
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid internal HMAC headers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Loan application not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal auth is not configured or the fetch failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /cba/loan-applications/{application_ref}/status:
    patch:
      tags:
        - Internal
      summary: Update loan application status from CBA
      description: |
        Callback endpoint used by CBA to update the local status of a loan application after review or booking.
        This endpoint is served under `/internal/v1` and is protected by HMAC headers.
      servers:
        - url: /internal/v1
      parameters:
        - in: path
          name: application_ref
          required: true
          schema:
            type: string
          description: Local loan application reference.
        - in: header
          name: X-Timestamp
          required: true
          schema:
            type: string
            format: date-time
          description: RFC3339 timestamp used in the HMAC signing string. Must be within five minutes of server time.
        - in: header
          name: X-Signature
          required: true
          schema:
            type: string
          description: Lowercase hex HMAC-SHA256 signature of `METHOD + "\n" + PATH + "\n" + TIMESTAMP + "\n" + SHA256_HEX_OF_BODY` using `CBA_WEBHOOK_SECRET`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLoanApplicationStatusRequest"
      responses:
        "200":
          description: Loan application updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Invalid request body, missing path value, or invalid status payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid internal HMAC headers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Loan application not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Invalid state transition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal auth is not configured or the callback failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /cba/customers/bvn-record:
    get:
      tags:
        - Internal
      summary: Get loan applicant BVN record for CBA
      description: |
        Returns the linked BVN record for the supplied wallet user id together
        with the matched application reference.
        This endpoint is served under `/internal/v1` and is protected by HMAC headers.
      servers:
        - url: /internal/v1
      parameters:
        - in: query
          name: user_id
          required: true
          schema:
            type: string
          description: Wallet mobile user id to look up.
        - in: header
          name: X-Timestamp
          required: true
          schema:
            type: string
            format: date-time
          description: RFC3339 timestamp used in the HMAC signing string. Must be within five minutes of server time.
        - in: header
          name: X-Signature
          required: true
          schema:
            type: string
          description: Lowercase hex HMAC-SHA256 signature of `METHOD + "\n" + PATH + "\n" + TIMESTAMP + "\n" + SHA256_HEX_OF_BODY` using `CBA_WEBHOOK_SECRET`.
      responses:
        "200":
          description: Customer BVN record fetched successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalBVNRecordResponse"
        "401":
          description: Missing or invalid internal HMAC headers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Customer record not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Invalid mobile user id or bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal auth is not configured or the fetch failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /cba/customers/link-by-bvn:
    post:
      tags:
        - Internal
      summary: Link wallet users to a core customer by BVN
      description: |
        Updates local wallet users that share the supplied BVN so they point to the supplied core customer id.
        This endpoint is served under `/internal/v1` and is protected by HMAC headers.
      servers:
        - url: /internal/v1
      parameters:
        - in: header
          name: X-Timestamp
          required: true
          schema:
            type: string
            format: date-time
          description: RFC3339 timestamp used in the HMAC signing string. Must be within five minutes of server time.
        - in: header
          name: X-Signature
          required: true
          schema:
            type: string
          description: Lowercase hex HMAC-SHA256 signature of `METHOD + "\n" + PATH + "\n" + TIMESTAMP + "\n" + SHA256_HEX_OF_BODY` using `CBA_WEBHOOK_SECRET`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LinkWalletUserByBVNRequest"
      responses:
        "200":
          description: Wallet user linkage processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkWalletUserByBVNEnvelope"
        "400":
          description: Invalid request body or invalid customer/BVN values
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid internal HMAC headers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal auth is not configured or the update failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /cba/customers/{customer_id}/status:
    patch:
      tags:
        - Internal
      summary: Update customer status from CBA
      description: |
        Callback endpoint used by CBA to update the local customer status for a core customer id.
        Allowed values are `embryo`, `pending`, and `approved`.
        This endpoint is served under `/internal/v1` and is protected by HMAC headers.
      servers:
        - url: /internal/v1
      parameters:
        - in: path
          name: customer_id
          required: true
          schema:
            type: string
          description: Core customer id from CBA.
        - in: header
          name: X-Timestamp
          required: true
          schema:
            type: string
            format: date-time
          description: RFC3339 timestamp used in the HMAC signing string. Must be within five minutes of server time.
        - in: header
          name: X-Signature
          required: true
          schema:
            type: string
          description: Lowercase hex HMAC-SHA256 signature of `METHOD + "\n" + PATH + "\n" + TIMESTAMP + "\n" + SHA256_HEX_OF_BODY` using `CBA_WEBHOOK_SECRET`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCustomerStatusRequest"
      responses:
        "200":
          description: Customer status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Invalid request body, customer id, or status payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid internal HMAC headers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Customer not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Invalid customer status transition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal auth is not configured or the callback failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Bank:
      type: object
      properties:
        code:
          type: string
          example: "058"
        name:
          type: string
          example: Guaranty Trust Bank
    BankListResponse:
      type: object
      properties:
        status:
          type: boolean
          example: true
        banks:
          type: array
          items:
            $ref: "#/components/schemas/Bank"
    BankDetails:
      type: object
      properties:
        bankCode:
          type: string
          example: "058"
        accountName:
          type: string
          example: John Doe
        accountNumber:
          type: string
          example: "0123456789"
    BankDetailsResponse:
      type: object
      properties:
        status:
          type: boolean
          example: true
        account:
          $ref: "#/components/schemas/BankDetails"
    TransferRequest:
      type: object
      required:
        - amount
        - sortCode
        - accountNumber
        - transaction_pin
      properties:
        amount:
          type: integer
          format: int64
          description: Transfer amount in the smallest currency unit (e.g. kobo).
          example: 5000
        sortCode:
          type: string
          description: Bank sort code / routing code.
          example: "058"
        accountNumber:
          type: string
          description: Destination bank account number.
          example: "0123456789"
        narration:
          type: string
          maxLength: 255
          description: Optional transfer narration.
          example: Payment for services
        accountName:
          type: string
          maxLength: 255
          description: Optional destination account name.
          example: John Doe
        metadata:
          type: object
          additionalProperties: true
          description: Optional arbitrary key-value metadata.
        transaction_pin:
          type: string
          description: User's 4-digit transaction PIN to authorize the transfer.
          example: "1234"
    TransferResult:
      type: object
      properties:
        amount:
          type: number
          format: double
          example: 50.00
        charges:
          type: number
          format: double
          example: 1.50
        vat:
          type: number
          format: double
          example: 0.11
        reference:
          type: string
          example: TXN-20240101-001
        total:
          type: number
          format: double
          example: 51.61
        metadata:
          type: object
          additionalProperties: true
        sessionId:
          type: string
          example: SESSION-20240101-001
        destination:
          type: string
          example: "0123456789"
        transactionReference:
          type: string
          example: REF-20240101-001
        description:
          type: string
          example: Transfer to John Doe
    TransferResponse:
      type: object
      properties:
        status:
          type: boolean
          example: true
        message:
          type: string
          example: Transfer initiated successfully
        transfer:
          $ref: "#/components/schemas/TransferResult"
    Beneficiary:
      type: object
      properties:
        ID:
          type: string
          example: 3f7e2c1a-4b5d-4e6f-8a9b-0c1d2e3f4a5b
        MobileUserID:
          type: string
          example: 1a2b3c4d-5e6f-7a8b-9c0d-1e2f3a4b5c6d
        WalletID:
          type: string
          example: WLT-001
        BankCode:
          type: string
          example: "058"
        AccountNumber:
          type: string
          example: "0123456789"
        AccountName:
          type: string
          example: John Doe
        CreatedAt:
          type: string
          format: date-time
        UpdatedAt:
          type: string
          format: date-time
          nullable: true
    AddBeneficiaryRequest:
      type: object
      required:
        - bank_code
        - account_number
        - account_name
        - wallet_id
      properties:
        bank_code:
          type: string
          example: "058"
        account_number:
          type: string
          example: "0123456789"
        account_name:
          type: string
          example: John Doe
        wallet_id:
          type: string
          example: WLT-001
    AddBeneficiaryResponse:
      type: object
      properties:
        status:
          type: boolean
          example: true
        message:
          type: string
          example: Beneficiary added successfully
        beneficiary:
          $ref: "#/components/schemas/Beneficiary"
    FetchBeneficiariesResponse:
      type: object
      properties:
        status:
          type: boolean
          example: true
        message:
          type: string
          example: Beneficiaries fetched successfully
        beneficiaries:
          type: array
          items:
            $ref: "#/components/schemas/Beneficiary"
    ActiveLoan:
      type: object
      properties:
        loan_id:
          type: string
          example: LN-001
        loan_number:
          type: string
          example: "20240001"
        loan_amount:
          type: number
          format: double
          description: Original principal amount of the loan.
          example: 50000.00
        total_repayment:
          type: number
          format: double
          description: Total outstanding balance remaining to be repaid.
          example: 45000.00
        monthly_repayment:
          type: number
          format: double
          description: Amount due on the next repayment date.
          example: 5000.00
        next_due_date:
          type: string
          example: "2026-05-01"
    AccountSummary:
      type: object
      properties:
        full_name:
          type: string
          example: John Doe
        account_number:
          type: string
          example: "0123456789"
        available_balance:
          type: integer
          format: int64
          description: Available wallet balance in the smallest currency unit (e.g. kobo).
          example: 250000
        loan_balance:
          type: number
          format: double
          description: Sum of outstanding balances across all active loans.
          example: 45000.00
        active_loans:
          type: array
          items:
            $ref: "#/components/schemas/ActiveLoan"
    AccountSummaryResponse:
      type: object
      properties:
        status:
          type: boolean
          example: true
        data:
          $ref: "#/components/schemas/AccountSummary"
    UpdateProfileRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          description: New email address for the user.
          example: john.doe@example.com
        address:
          type: string
          description: New physical address for the user.
          example: "12 Lagos Street, Abuja"
    UpdateProfileResponse:
      type: object
      properties:
        status:
          type: boolean
          example: true
        message:
          type: string
          example: Profile successfully updated
    DevHealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
    DevSignRequest:
      type: object
      required:
        - device_id
        - challenge
      properties:
        device_id:
          type: string
          example: sim-device-1
        challenge:
          type: string
          example: V6Y0dxLF5leasw5ISJZgshZc8HP75fkQjwD8f2fOUeQ
    DevSignResponse:
      type: object
      required:
        - signature
        - algorithm
      properties:
        signature:
          type: string
          description: Base64url-encoded ECDSA P-256 signature (ASN.1 DER) over SHA-256(challenge)
          example: MEUCIG4lQ0A5Wc1zN8hP8o2N2iU9V3gT0E2q9r2m1kYzv1U-AiEAz8r8Jt2s2l7cQwZ9k0IY3l8Gx6b4u5m8N9p0Q1r2s3A
        algorithm:
          type: string
          example: ecdsa-p256-sha256
    DeviceRegistrationRequest:
      type: object
      required:
        - device_id
        - public_key
        - device_name
        - device_model
        - os
        - os_version
        - app_version
      properties:
        device_id:
          type: string
          example: app-installation-id
        public_key:
          type: string
          example: yMK6+dd12JqQtw6Ts5nF7gxjMe6VQ7n1xNlwLWmk/yI=
        device_name:
          type: string
          example: John's iPhone
        device_model:
          type: string
          example: iPhone 15
        os:
          type: string
          example: iOS
        os_version:
          type: string
          example: "18.2"
        app_version:
          type: string
          example: 1.0.0
    RegisterRequest:
      type: object
      required:
        - phone_number
        - password
        - confirm_password
        - transaction_pin
        - confirm_transaction_pin
        - bvn_verification_id
        - nin_verification_id
        - phone_verification_id
        - is_biometrics_enabled
        - device
      properties:
        phone_number:
          type: string
          description: Nigerian phone number. Accepted local or international forms are normalized server-side.
          example: "08012345678"
        email:
          type: string
          format: email
          description: Optional email address. When supplied, pair it with `email_verification_id`.
          example: user@example.com
        password:
          type: string
          minLength: 8
          example: your-password
        confirm_password:
          type: string
          minLength: 8
          example: your-password
