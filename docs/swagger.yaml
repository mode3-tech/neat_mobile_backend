          description: Optional explicit Expo channel override. When omitted, the backend derives the channel from `type`.
          example: transactions
    NotificationHistoryItem:
      type: object
      required:
        - id
        - user_id
        - title
        - body
        - type
        - data
        - is_read
        - created_at
      properties:
        id:
          type: string
          example: 0ae0d8ef-5a60-4e18-9527-b96abd2d4731
        user_id:
          type: string
          example: 8a732d01-63fb-4e68-bfc8-7d69c7c4157e
        title:
          type: string
          example: Loan Approved
        body:
          type: string
          example: Your loan has been approved.
        type:
          $ref: "#/components/schemas/NotificationType"
        data:
          type: object
          additionalProperties: true
          example:
            screen: /(loan)/repayment-schedule
            params:
              loanId: LN-1001
        is_read:
          type: boolean
          example: false
        created_at:
          type: string
          format: date-time
          example: "2026-03-23T10:00:00Z"
        read_at:
          type: string
          format: date-time
          nullable: true
          example: "2026-03-23T10:05:00Z"
    NotificationsListResponse:
      type: object
      required:
        - notifications
        - page
        - page_size
        - total
        - has_next
      properties:
        notifications:
          type: array
          items:
            $ref: "#/components/schemas/NotificationHistoryItem"
        page:
          type: integer
          example: 1
        page_size:
          type: integer
          example: 20
        total:
          type: integer
          format: int64
          example: 37
        has_next:
          type: boolean
          example: true
    UnreadCountResponse:
      type: object
      required:
        - count
      properties:
        count:
          type: integer
          example: 5
    NotificationReadResponse:
      type: object
      required:
        - message
        - updated
      properties:
        message:
          type: string
          example: notification updated
        updated:
          type: boolean
          example: true
    NotificationsReadAllResponse:
      type: object
      required:
        - message
        - updated
      properties:
        message:
          type: string
          example: notifications updated
        updated:
          type: integer
          format: int64
          example: 12
    MessageResponse:
      type: object
      properties:
        message:
          type: string
          example: otp sent
    TransactionItem:
      type: object
      required:
        - id
        - type
        - description
        - date
        - status
        - amount
      properties:
        id:
          type: string
          example: 3f7a1c2e-d84b-4f90-a3c1-2e5b6d8f0a1c
        type:
          type: string
          enum:
            - credit
            - debit
          example: credit
        description:
          type: string
          example: Transfer from John Doe
        date:
          type: string
          format: date-time
          example: "2026-04-03T14:22:00+01:00"
        status:
          type: string
          enum:
            - pending
            - successful
            - failed
            - reversed
          example: successful
        amount:
          type: integer
          format: int64
          description: Amount in the smallest currency unit (kobo).
          example: 500000
    FetchRecentTransactionsResponse:
      type: object
      properties:
        status:
          type: boolean
          example: true
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/TransactionItem"
    TransactionSection:
      type: object
      description: A group of transactions belonging to a single calendar month.
      properties:
        month:
          type: string
          description: Human-readable month label.
          example: April 2026
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/TransactionItem"
    PagedTransactionResponse:
      type: object
      properties:
        status:
          type: boolean
          example: true
        sections:
          type: array
          description: Transactions grouped by month, ordered newest-first.
          items:
            $ref: "#/components/schemas/TransactionSection"
        next_cursor:
          type: string
          format: date-time
          description: RFC3339 timestamp to pass as `cursor` on the next request. Empty string when there are no more pages.
          example: "2026-03-01T00:00:00Z"
        has_more:
          type: boolean
          description: True if there are additional pages of transactions available.
          example: true
    ForgotTransactionPinResponse:
      type: object
