openapi: 3.0.3
info:
  title: Neat Mobile App Backend API
  version: 1.0.0
  description: |
    HTTP API for authentication, OTP verification, device trust, identity validation,
    password reset, loan product workflows, and wallet/bank lookup.
servers:
  - url: /api/v1
security: []
tags:
  - name: Auth
    description: Authentication and identity endpoints
  - name: OTP
    description: OTP request and verification endpoints
  - name: Loan
    description: Loan product discovery and application endpoints
  - name: Notification
    description: Push-token registration and in-app notification history endpoints
  - name: Account
    description: Account summary and profile endpoints
  - name: Wallet
    description: Bank lookup and account resolution endpoints
  - name: Transaction
    description: Transaction history endpoints
  - name: Webhook
    description: Inbound webhook endpoints from external providers
  - name: Internal
    description: Internal CBA integration endpoints protected by HMAC headers
  - name: Dev Signer
    description: Development-only signer helper endpoints for Postman/device simulation
  - name: NeatSave
    description: Savings goal and auto-save rule endpoints
paths:
  /auth/register:
    post:
      tags:
        - Auth
      summary: Register a user
      description: |
        Accepts a registration request, consumes the verification records locally, and creates a durable registration job.
        Returns a `job_id` plus a one-time `claim_token` that can later be exchanged for access and refresh tokens
        after the job reaches `completed`. Registration no longer returns auth tokens directly.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "202":
          description: Registration accepted and queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegistrationJobResponse"
              examples:
                queued:
                  value:
                    status: success
                    message: registration queued successfully
                    job_id: b8fa4c0f-a086-4f9d-96db-3ac7457f6298
                    registration_status: pending
                    can_login: false
                    can_claim_session: false
                    claim_token: reg_claim_x7F1z0gVh4Wk2NfQ
                    claim_expires_at: "2026-05-02T18:30:00Z"
        "200":
          description: Matching registration already completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegistrationJobResponse"
              examples:
                completed:
                  value:
                    status: success
                    message: registration completed successfully, claim session to continue
                    job_id: b8fa4c0f-a086-4f9d-96db-3ac7457f6298
                    registration_status: completed
                    can_login: true
                    can_claim_session: true
                    claim_token: reg_claim_x7F1z0gVh4Wk2NfQ
                    claim_expires_at: "2026-05-02T18:30:00Z"
        "400":
          description: Invalid request body, invalid phone number, or failed registration validation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Registration already in progress or account already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Registration failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/register/{job_id}/status:
    get:
      tags:
        - Auth
      summary: Get registration job status
      description: |
        Returns the current status of a registration job. This endpoint is intentionally token-free:
        it never returns access or refresh tokens. Use the one-time `claim_token` from `/auth/register`
        with `/auth/register/{job_id}/claim` after the job is complete.
      parameters:
        - in: path
          name: job_id
          required: true
          schema:
            type: string
          description: Registration job identifier returned by `/auth/register`.
      responses:
        "200":
          description: Registration job status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegistrationJobResponse"
              examples:
                processing:
                  value:
                    status: success
                    message: registration is being processed
                    job_id: b8fa4c0f-a086-4f9d-96db-3ac7457f6298
                    registration_status: processing
                    can_login: false
                    can_claim_session: false
                completed:
                  value:
                    status: success
                    message: registration completed successfully, claim session to continue
                    job_id: b8fa4c0f-a086-4f9d-96db-3ac7457f6298
                    registration_status: completed
                    can_login: true
                    can_claim_session: true
                    claim_expires_at: "2026-05-02T18:30:00Z"
        "400":
          description: Missing or invalid job id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Registration job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to fetch registration job status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/register/{job_id}/claim:
    post:
      tags:
        - Auth
      summary: Claim registration session
      description: |
        Exchanges the one-time `claim_token` returned by `/auth/register` for access and refresh tokens
        after the registration job is `completed`. The request must include the original `X-Device-ID`
        submitted during registration. A claim token can only be used once.
      parameters:
        - in: path
          name: job_id
          required: true
          schema:
            type: string
          description: Registration job identifier returned by `/auth/register`.
        - in: header
          name: X-Device-ID
          required: true
          schema:
            type: string
          description: Original device identifier submitted in the registration payload.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegistrationSessionClaimRequest"
      responses:
        "200":
          description: Registration session claimed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyDeviceResponse"
        "400":
          description: Invalid request body or missing job id, device id, or claim token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid or expired claim token, or device not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Registration job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Registration is not complete, failed, unavailable for claim, or already claimed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to claim registration session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/login:
    post:
      tags:
        - Auth
      summary: Login a user
      description: |
        Authenticates a user by phone and password, then starts device verification flow.
        The server evaluates the submitted `X-Device-ID` against the authenticated user's stored devices.
        If that device exists and is both active and trusted, returns `challenge_required`.
        If the device is missing, inactive, or untrusted, returns `new_device_detected`, sends a login OTP to the user's
        phone number, and returns a `session_token` for `/auth/device/otp/verify` and `/auth/device/otp/resend`.
      parameters:
        - in: header
          name: X-Device-ID
          required: true
          schema:
            type: string
          description: Stable device installation identifier from the mobile app, used to look up device trust for the account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login initialized; response shape depends on device trust state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginInitResponse"
              examples:
                challenge_required:
                  summary: Recognized trusted device
                  value:
                    status: challenge_required
                    challenge: V6Y0dxLF5leasw5ISJZgshZc8HP75fkQjwD8f2fOUeQ
                new_device_detected:
                  summary: Device missing, inactive, or untrusted
                  value:
                    status: new_device_detected
                    session_token: CxDfs7E0ucjQ8v72n9v5M9o2xU4SyfV8h3caE6WvF1A
        "400":
          description: Invalid request body, invalid phone number, or missing/invalid device id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid phone or password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Too many login attempts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Login initialization failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/device/challenge/verify:
    post:
      tags:
        - Auth
      summary: Verify device challenge
      description: Verifies a signed login challenge for a recognized trusted device and returns tokens.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyDeviceRequest"
      responses:
        "200":
          description: Device verification successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyDeviceResponse"
        "400":
          description: Invalid request body or missing challenge fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid challenge or signature verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Device verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/device/otp/verify:
    post:
      tags:
        - Auth
      summary: Verify new device with OTP
      description: |
        Completes login when the submitted `X-Device-ID` from `/auth/login` was not found as an
        active trusted device, using the `session_token` returned by `/auth/login` and the OTP sent
        during `new_device_detected` flow. If the OTP expires or is not received, request another code
        with `/auth/device/otp/resend` using the same `session_token` and `device_id`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewDeviceRequest"
      responses:
        "200":
          description: New device verified and tokens issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyDeviceResponse"
        "400":
          description: Invalid request body or missing required fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid/expired session token or invalid OTP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: New-device verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/device/otp/resend:
    post:
      tags:
        - Auth
      summary: Resend OTP for new device login
      description: |
        Resends the login OTP for an active `new_device_detected` session created by `/auth/login`.
        The same `session_token` remains valid and the pending session expiry is extended.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResendNewDeviceOTPRequest"
      responses:
        "200":
          description: OTP resent successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
              examples:
                success:
                  value:
                    message: otp resent successfully
        "400":
          description: Invalid request body or missing session token/device id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid or expired session token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: OTP resend cooldown or resend limit reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to resend OTP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /health:
    get:
      tags:
        - Dev Signer
      summary: Dev signer health check
      description: |
        Development-only endpoint served by `cmd/devsigner`.
      servers:
        - url: http://localhost:9090
      responses:
        "200":
          description: Signer is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DevHealthResponse"
  /sign:
    post:
      tags:
        - Dev Signer
      summary: Sign challenge (development only)
      description: |
        Development-only endpoint served by `cmd/devsigner` to help Postman flows.
        It signs `SHA-256(challenge)` using the configured ECDSA P-256 private key for `device_id`.
      servers:
        - url: http://localhost:9090
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DevSignRequest"
      responses:
        "200":
          description: Challenge signed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DevSignResponse"
        "400":
          description: Invalid request body or missing fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Device key not found in signer configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/logout:
    post:
      tags:
        - Auth
      summary: Logout a user
      description: Revokes the current auth session and refresh token record.
      parameters:
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
          description: "Bearer access token. Example: `Bearer <access_token>`."
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
      responses:
        "200":
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Invalid request body or missing authorization header
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid authorization header
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Logout failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/refresh:
    post:
      tags:
        - Auth
      summary: Refresh access token
      description: Validates a refresh token and device binding from request body, rotates the refresh token, and returns new access and refresh tokens.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: Tokens refreshed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          description: Missing refresh token/device id or invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Token refresh failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/validate/bvn:
    post:
      tags:
        - Auth
      summary: Validate BVN
      description: Validates a BVN using Tendar only. Provider preference from CBA is ignored for this endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BVNValidationRequest"
      responses:
        "200":
          description: BVN validated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BVNValidationResponse"
        "400":
          description: Missing or invalid request body, invalid BVN, or provider validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Upstream service unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "504":
          description: Upstream service timed out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: CBA lookup, provider, or internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/validate/nin:
    post:
      tags:
        - Auth
      summary: Validate NIN
      description: Validates a NIN using the configured NIN provider and compares it with a previously verified BVN using `bvn_validation_id`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NINValidationRequest"
      responses:
        "200":
          description: NIN validated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NINValidationResponse"
        "400":
          description: Missing or invalid request body, invalid NIN, or provider validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Upstream service unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "504":
          description: Upstream service timed out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Provider or internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/password/forgot:
    post:
      tags:
        - Auth
      summary: Request password reset OTP
      description: Sends a password reset OTP to the account phone number for a recognized device.
      parameters:
        - in: header
          name: X-Device-ID
          required: true
          schema:
            type: string
          description: Registered device identifier for the account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
      responses:
        "200":
          description: Password reset OTP sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForgotPasswordResponse"
        "400":
          description: Invalid request body, phone required, or invalid phone number
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Account not found for phone number or device not recognized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to create or send password reset OTP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/password/forgot/resend:
    post:
      tags:
        - Auth
      summary: Resend password reset OTP
      description: Resends the password reset OTP to the account phone number for a recognized device.
      parameters:
        - in: header
          name: X-Device-ID
          required: true
          schema:
            type: string
          description: Registered device identifier for the account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
      responses:
        "200":
          description: Password reset OTP resent successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResendForgotPasswordOTPResponse"
        "400":
          description: Invalid request body, phone required, or invalid phone number
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Account not found for phone number or device not recognized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to resend password reset OTP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/password/forgot/verify:
    post:
      tags:
        - Auth
      summary: Verify password reset OTP
      description: Verifies the password reset OTP using the `otp_id` returned from the forgot step. Returns a `verification_id` (valid for 15 minutes) to be passed to the reset step.
      parameters:
        - in: header
          name: X-Device-ID
          required: true
          schema:
            type: string
          description: Registered device identifier for the account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyForgotPasswordOTPRequest"
      responses:
        "200":
          description: OTP verified successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyForgotPasswordOTPResponse"
        "400":
          description: Invalid request body, device id required, otp id required, or otp code required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid OTP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/password/reset:
    patch:
      tags:
        - Auth
      summary: Reset password with verification ID
      description: Consumes the `verification_id` obtained from the verify step and updates the user's password. The verification_id expires 15 minutes after the OTP was verified.
      parameters:
        - in: header
          name: X-Device-ID
          required: true
          schema:
            type: string
          description: Registered device identifier for the account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "200":
          description: Password reset successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Invalid request body, phone required, verification id required, or invalid password format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Device not found, device not allowed, invalid verification id, verification id expired, or no account exists under this phone number
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Password reset failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/pin/forgot:
    post:
      tags:
        - Auth
      summary: Request transaction PIN reset OTP
      description: Sends a transaction PIN reset OTP to the account phone number. Returns an `otp_id` to be passed to the verify step.
      parameters:
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
          description: "Bearer access token. Example: `Bearer <access_token>`."
        - in: header
          name: X-Device-ID
          required: true
          schema:
            type: string
          description: Registered device identifier for the account.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: PIN reset OTP sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForgotTransactionPinResponse"
        "400":
          description: Device id is required or invalid phone number on account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Device not found or user not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/pin/forgot/resend:
    post:
      tags:
        - Auth
      summary: Resend transaction PIN reset OTP
      description: Resends the transaction PIN reset OTP to the authenticated user's phone number.
      parameters:
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
          description: "Bearer access token. Example: `Bearer <access_token>`."
        - in: header
          name: X-Device-ID
          required: true
          schema:
            type: string
          description: Registered device identifier for the account.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OTP resent successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Device id is required or invalid phone number on account
          content:
            application/json:
              schema:
